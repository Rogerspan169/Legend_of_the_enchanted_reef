<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珊瑚礁保衛戰――遊戲規則</title>
  <link rel="icon" href="https://raw.githubusercontent.com/tam004team/Great_salt_lake/main/images/Salt_lake_icon.png" type="image/png">
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      color: white;
      text-align: center;
    }

.stars {
  position: fixed;
  width: 100%;
  height: 100%;

  /* 🎯 黑底 + 海洋光暈 */
  background:
    radial-gradient(circle at 50% 70%, rgba(0,150,255,0.25), transparent 60%),
    radial-gradient(circle at 20% 30%, rgba(0,100,200,0.2), transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(0,80,180,0.15), transparent 50%),
    black;

  animation: oceanGlow 8s ease-in-out infinite alternate;

  z-index: 0;
}

@keyframes oceanGlow {
  0% {
    background-position: 50% 70%, 20% 30%, 80% 20%, 0 0;
  }
  100% {
    background-position: 55% 75%, 25% 35%, 75% 25%, 0 0;
  }
}

    button {
      margin: 1em;
      padding: 0.75em 2em;
      font-size: 1.2em;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #1e90ff;
      color: white;
      transition: background 0.3s ease;
    }
    button:hover { background: #63b3ed; }

    .container {
      position: relative;
      z-index: 1;
      padding-top: 5vh;
    }

    h3 { color: #ffffff; }
    p { color: #ffffff; }

    .intro {
      text-align: justify;
      background: rgba(255,255,255,0.05);
      padding: 0.5em;
      border-radius: 10px;
    }

    footer {
      margin-top: 2em;
      font-size: 0.9em;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div id="start-screen">
      <div class="intro">
        <h3>🔍 規則介紹</h3>
        <p>1. 以滑鼠或觸控點擊螢幕上相鄰的海底垃圾，使兩者交換位置，使同類垃圾3個連成一線即可將它們消除。</p>
        <p>2. 同類垃圾4個連成一線可產生小不點。<br>點擊小不點後再點選任一同行/列的方塊即可消除整行/列的垃圾。</p>
        <p>2. 同類垃圾連成T/L型或十字可產生藍藍。<br>雙擊藍藍即可消除周圍九宮格的垃圾兩次。</p>
        <p>3. 同類垃圾5個連成一線可產生小傑。<br>點擊小傑後再點選任一周圍九宮格的方塊即可消除盤面上所有同類的垃圾。</p>
      </div>
      <button onclick="startGame()">作戰開始</button>
      <button onclick="goBack()">返回首頁</button>
    </div>
  </div>

  <script>
    function startGame() {
      localStorage.removeItem('gameTime');
      // 若遊戲與 index.html 同目錄，直接跳轉
      location.href = "./stage1.html";
    }

    function goBack() {
  location.href = "./index.html";
}
  </script>
</body>
</html>
