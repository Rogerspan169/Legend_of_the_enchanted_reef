<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消（完整版）</title>
<style>
body {
  background: #0b2a3c;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
canvas {
  background: #0e3f5a;
  border: 3px solid white;
}
</style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;

// ===== 圖片 =====
const images = [];
const imagePaths = [
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
  let img = new Image();
  img.src = imagePaths[i];
  img.onload = () => {
    loaded++;
    if (loaded === imagePaths.length) {
      initBoard();
      gameLoop();
      startTimer();
    }
  };
  images.push(img);
}

// ===== 狀態 =====
let board = [];
let selected = null;
let isAnimating = false;

let score = 0;
let combo = 0;
let comboCount = 0;
let timeLeft = 60;
let gameOver = false;

let floatingTexts = [];

let lastSwap = null;

let timeUp = false;

let justCreatedSpecial = null;

// ===== 初始化 =====

function hasPossibleMoves(){

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){

      let dirs = [
        [1,0],
        [0,1]
      ];

      for(let [dx,dy] of dirs){

        let nx = x + dx;
        let ny = y + dy;

        if(nx>=SIZE || ny>=SIZE) continue;

        // 模擬交換
        [board[y][x], board[ny][nx]] =
        [board[ny][nx], board[y][x]];

        let matches = findMatches();

        // 換回來
        [board[y][x], board[ny][nx]] =
        [board[ny][nx], board[y][x]];

        if(matches.length > 0){
          return true;
        }
      }
    }
  }

  return false;
}

function shuffleBoard(){

  let tiles = [];

  // 抽出所有 tile
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      tiles.push(board[y][x]);
    }
  }

  // 洗牌
  for(let i=tiles.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  // 塞回去
  let index = 0;
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      board[y][x] = tiles[index++];
    }
  }
}

function ensurePlayable(){

  while(true){

    if(findMatches().length === 0 && hasPossibleMoves()){
      return;
    }

    shuffleBoard();
  }
}

function initBoard(){
  board = [];

  for(let y=0;y<SIZE;y++){
    let row=[];

    for(let x=0;x<SIZE;x++){
      row.push(getSafeTile(x,y,row));
    }

    board.push(row);
  }
  ensurePlayable(); // ⭐ 加這行
}

function getSafeTile(x,y,row){

  let type;

  do{
    type = Math.floor(Math.random()*TYPES);

  }while(
    // 檢查橫向
    (x>=2 &&
     row[x-1].type === type &&
     row[x-2].type === type)

    ||

    // 檢查縱向
    (y>=2 &&
     board[y-1][x].type === type &&
     board[y-2][x].type === type)
  );

  return {
    type: type,
    special: null
  };
}

function addFloatingText(x, y, text){
  floatingTexts.push({
    x: x,
    y: y,
    text: text,
    life: 60,        // 幀數（約1秒）
    vy: -0.5         // 往上速度
  });
}

function randomTile(){
  return {
    type: Math.floor(Math.random()*TYPES),
    special: null
  };
}

// ===== 畫面 =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      drawTile(board[y][x],x,y);
    }
  }

  if(selected){
    ctx.strokeStyle="yellow";
    ctx.lineWidth=4;
    ctx.strokeRect(selected.x*TILE, selected.y*TILE+OFFSET_Y, TILE, TILE);
  }

  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("分數:"+score,0,34);
  ctx.fillText("時間:"+timeLeft,0,84);
  //ctx.fillText("Combo:"+combo,380,50);

  // ===== 浮動文字 =====
floatingTexts.forEach(ft=>{
  ctx.fillStyle = ft.text.includes("COMBO") ? "yellow" : "orange";
  ctx.font = "20px Arial";
  ctx.fillText(ft.text, ft.x, ft.y);

  ft.y += ft.vy;
  ft.life--;
});

// 移除消失的
floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function drawTile(tile,x,y){
  if(!tile) return;

  let img;
  if(tile.special==="line4") img=images[5];
  else if(tile.special==="T") img=images[6];
  else if(tile.special==="line5") img=images[7];
  else img=images[tile.type];

  ctx.drawImage(img,x*TILE,y*TILE+OFFSET_Y,TILE,TILE);
}

// ===== 點擊 =====
canvas.addEventListener("click",(e)=>{
  if(isAnimating || gameOver || timeUp) return;

  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/TILE);
  const y=Math.floor((e.clientY-rect.top-OFFSET_Y)/TILE);

  if(!selected){
    selected={x,y};
  }else{
    let dx=Math.abs(selected.x-x);
    let dy=Math.abs(selected.y-y);

    if((dx===1&&dy===0)||(dx===0&&dy===1)){
      swap(selected,{x,y});
      selected=null;
    }else{
      selected={x,y};
    }
  }
});

// ===== 交換 =====
function swap(a,b){
  isAnimating=true;
  combo=0;
  comboCount=0;

  lastSwap = [a, b]; // ⭐ 記錄

  [board[a.y][a.x],board[b.y][b.x]] =
  [board[b.y][b.x],board[a.y][a.x]];

  setTimeout(()=>{
    let matches=findMatches();

    if(matches.length===0){
      [board[a.y][a.x],board[b.y][b.x]]=
      [board[b.y][b.x],board[a.y][a.x]];
      isAnimating=false;
    }else{
      resolveLoop();
    }
  },150);
}

function mergeGroups(groups){
  let merged=[];

  groups.forEach(group=>{
    let added=false;

    for(let m of merged){
      if(group.some(([y,x]) =>
        m.some(([y2,x2]) => y===y2 && x===x2)
      )){
        m.push(...group);
        added=true;
        break;
      }
    }

    if(!added){
      merged.push([...group]);
    }
  });

  // 去重
  return merged.map(group=>{
    let set=new Set(group.map(([y,x])=>y+"_"+x));
    return Array.from(set).map(s=>{
      let [y,x]=s.split("_").map(Number);
      return [y,x];
    });
  });
}

function isJustCreated(y,x){
  return justCreatedSpecial &&
         justCreatedSpecial.y === y &&
         justCreatedSpecial.x === x;
}

// ===== 找三消（安全版）=====
function findMatches(){
  let groups=[];

  // 橫
  for(let y=0;y<SIZE;y++){
    let count=1;
    for(let x=1;x<SIZE;x++){
      if(!board[y][x]||!board[y][x-1]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y,x-1)){
  count = 1;
  continue;
}

      if(board[y][x].type===board[y][x-1].type){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y,x-1-k]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([y,SIZE-1-k]);
      groups.push(g);
    }
  }

  // 直
  for(let x=0;x<SIZE;x++){
    let count=1;
    for(let y=1;y<SIZE;y++){
      if(!board[y][x]||!board[y-1][x]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y-1,x)){
  count = 1;
  continue;
}

      if(board[y][x].type===board[y-1][x].type){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y-1-k,x]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([SIZE-1-k,x]);
      groups.push(g);
    }
  }

  return groups;
}

// ===== 核心連鎖流程 =====
function resolveLoop(){

  let groups=mergeGroups(findMatches());

  if(groups.length===0){
    
    if(comboCount>=2){
  let bonus = comboCount*10;
  score += bonus;

  addFloatingText(200, 50, "COMBO +" + bonus);
}

    ensurePlayable(); // ⭐ 防死局

    isAnimating=false;
    combo=0;
    comboCount=0;
    lastSwap = null;

    // ⭐ 時間到 → 現在才結算
  if(timeUp && !gameOver){
    gameOver = true;
    setTimeout(()=>{
      alert("時間到！分數:"+score);
    },200);
  }

    return;
  }

  let group=groups[0];

  combo++;
  comboCount++;

  let ys=group.map(p=>p[0]);
  let xs=group.map(p=>p[1]);

  let uniqueY=new Set(ys).size;
  let uniqueX=new Set(xs).size;

  let base=0;
  let special=null;

  // ⭐ 先判「純直線」
if(group.length>=5 && (uniqueX===1 || uniqueY===1)){
  base=35;
  special="line5";
}
else if(group.length===4 && (uniqueX===1 || uniqueY===1)){
  base=20;
  special="line4";
}

// ⭐ 再判「T / L / 十字」
else if(group.length>=4 && uniqueX>=2 && uniqueY>=2){
  base=25;
  special="T";
}

// ⭐ 最後才是普通三消
else{
  base=10;
}

  score+=base;

  let avgX = 0;
let avgY = 0;

group.forEach(([y,x])=>{
  avgX += x;
  avgY += y;
});

avgX /= group.length;
avgY /= group.length;

addFloatingText(
  avgX * TILE,
  avgY * TILE + OFFSET_Y,
  "+" + base
);

  let cy, cx;

// ⭐ 優先用玩家交換位置
if(lastSwap){
  let [a,b] = lastSwap;

  if(group.some(([y,x])=>y===a.y && x===a.x)){
    cy = a.y;
    cx = a.x;
  }
  else if(group.some(([y,x])=>y===b.y && x===b.x)){
    cy = b.y;
    cx = b.x;
  }
  else{
    // fallback（連鎖時用）
    let center = group[Math.floor(group.length/2)];
    cy = center[0];
    cx = center[1];
  }
}else{
  let center = group[Math.floor(group.length/2)];
  cy = center[0];
  cx = center[1];
}
  let original = board[cy][cx] ? board[cy][cx].type : Math.floor(Math.random()*TYPES);

  group.forEach(([y,x])=>{
    if(y===cy&&x===cx) return;
    board[y][x]=null;
  });

  if(special){
    board[cy][cx]={type:original,special};
    justCreatedSpecial = {y:cy, x:cx}; // ⭐ 記錄
  }else{
    board[cy][cx]=null;
  }

  draw();

  setTimeout(()=>{
    dropTiles();
    draw();

    setTimeout(resolveLoop,150);
  },150);

  justCreatedSpecial = null;
}

// ===== 掉落 =====
function dropTiles(){
  for(let x=0;x<SIZE;x++){
    let col=[];
    for(let y=SIZE-1;y>=0;y--){
      if(board[y][x]) col.push(board[y][x]);
    }
    while(col.length<SIZE) col.push(randomTile());

    for(let y=SIZE-1;y>=0;y--){
      board[y][x]=col[SIZE-1-y];
    }
  }
}

// ===== LOOP =====
function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== 計時 =====
function startTimer(){
  setInterval(()=>{

    if(gameOver) return;

    if(timeLeft > 0){
      timeLeft--;
    }

    if(timeLeft <= 0){
      timeLeft = 0;
      timeUp = true;

      // ⭐ 沒在動畫 → 立即結算
      if(!isAnimating){
        gameOver = true;
        setTimeout(()=>{
          alert("時間到！分數:"+score);
        },100);
      }
    }

  },1000);
}
</script>

</body>
</html>
