<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>海洋三消（完整版）</title>
  <style>
    body {
      background: #0b2a3c;
      display: flex;
      justify-content: center;
      margin-top: 20px;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #0e3f5a;
      border: 3px solid white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;
const PLASTIC = 0;

// ===== 圖片載入 =====
const images = [];
const imagePaths = [
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
  let img = new Image();
  img.src = imagePaths[i];
  img.onload = () => {
    loaded++;
    if (loaded === imagePaths.length) {
      initBoard();
      gameLoop();
      startTimer();
    }
  };
  images.push(img);
}

// ===== 遊戲狀態 =====
let board = [];
let selected = null;
let isAnimating = false;
let score = 0;
let combo = 0;
let comboCount = 0;
let timeLeft = 60;
let gameOver = false;
let floatingTexts = [];
let lastSwap = null;
let timeUp = false;
let justCreatedSpecial = null;
let pendingSkill = null;
let pendingJake = null;
let pendingIndigo = null;
let stage = 1;
let plasticCleared = 0;
let stageMessageTimer = 0;
let movesLeft = 40;
let gameStarted = false;
let pendingExplosions = [];
let explodingNow = new Set();

let pendingJakeChains = [];

// 畫布 UI 狀態
let showEndOverlay = false; 
let overlayConfig = {
    title: "",
    subtitle: "",
    btnText: "",
    action: "" // 'next', 'retry', 'reload'
};

// ===== 核心功能 =====

function initBoard(){
  board = [];
  for(let y=0;y<SIZE;y++){
    let row=[];
    for(let x=0;x<SIZE;x++){
      row.push(getSafeTile(x,y,row));
    }
    board.push(row);
  }
  ensurePlayable();
}

function getSafeTile(x,y,row){
  let type;
  do {
    type = Math.floor(Math.random()*TYPES);
  } while(
    (x>=2 && row[x-1].type === type && row[x-2].type === type) ||
    (y>=2 && board[y-1][x].type === type && board[y-2][x].type === type)
  );
  return { type, special: null };
}

function ensurePlayable(){
  while(findMatches().length !== 0 || !hasPossibleMoves()){
    shuffleBoard();
  }
}

function hasPossibleMoves(){
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      let dirs = [[1,0],[0,1]];
      for(let [dx,dy] of dirs){
        let nx = x + dx, ny = y + dy;
        if(nx>=SIZE || ny>=SIZE) continue;
        [board[y][x], board[ny][nx]] = [board[ny][nx], board[y][x]];
        let matches = findMatches();
        [board[y][x], board[ny][nx]] = [board[ny][nx], board[y][x]];
        if(matches.length > 0) return true;
      }
    }
  }
  return false;
}

function shuffleBoard(){
  let tiles = [];
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) tiles.push(board[y][x]);
  for(let i=tiles.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  let index = 0;
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) board[y][x] = tiles[index++];
}

// ===== 繪製邏輯 =====

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 1. 畫棋盤
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      drawTile(board[y][x],x,y);
    }
  }

  // 2. 畫選取框
  if(selected){
    ctx.strokeStyle="yellow";
    ctx.lineWidth=4;
    ctx.strokeRect(selected.x*TILE, selected.y*TILE+OFFSET_Y, TILE, TILE);
  }

  // 3. 畫 UI 文字
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.textAlign = "left";
  if(stage === 1){
    ctx.fillText("分數: " + score, 10, 34);
    ctx.fillText("時間: " + timeLeft, 10, 74);
  } else {
    ctx.fillText("清除塑膠袋: " + plasticCleared + "/100", 10, 34);
    ctx.fillText("剩餘步數: " + movesLeft, 10, 74);
  }

  // 4. 浮動文字
  floatingTexts.forEach(ft=>{
    ctx.fillStyle = ft.text.includes("COMBO") ? "yellow" : "orange";
    ctx.fillText(ft.text, ft.x, ft.y);
    ft.y += ft.vy;
    ft.life--;
  });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  // 5. 技能提示
  if(pendingSkill) drawHighlight(pendingSkill.x, pendingSkill.y, "red");
  if(pendingJake) drawHighlight(pendingJake.x, pendingJake.y, "black");
  if(pendingIndigo) drawHighlight(pendingIndigo.x, pendingIndigo.y, "blue");

  // 6. Stage 2 橫幅訊息
  if(stageMessageTimer > 0){
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";
    ctx.fillText("STAGE 2: 清除 100 個塑膠袋！", canvas.width/2, 50);
    stageMessageTimer--;
  }

  // 7. 黑色全屏遮罩 (開場 & 結算)
  if (!gameStarted || showEndOverlay) {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";

    if (!gameStarted) {
      ctx.font = "24px Arial";
      ctx.fillText("第 1 關：阻止原生珊瑚礁繼續白化", canvas.width / 2, 140);
      ctx.font = "18px Arial";
      ctx.fillText("目標：達到 800 分", canvas.width / 2, 200);
      drawMenuButton("開始遊戲");
    } else if (showEndOverlay) {
      ctx.font = "24px Arial";
      ctx.fillText(overlayConfig.title, canvas.width / 2, 140);
      ctx.font = "18px Arial";
      let lines = overlayConfig.subtitle.split("\n");
      lines.forEach((line, i) => ctx.fillText(line, canvas.width / 2, 200 + i * 30));
      drawMenuButton(overlayConfig.btnText);
    }
  }
}

function drawTile(tile,x,y){
  if(!tile) return;
  let img;
  if(tile.special==="line4") img=images[5];
  else if(tile.special==="T") img=images[6];
  else if(tile.special==="line5") img=images[7];
  else img=images[tile.type];
  ctx.drawImage(img,x*TILE,y*TILE+OFFSET_Y,TILE,TILE);
}

function drawHighlight(x, y, color){
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.strokeRect(x*TILE, y*TILE+OFFSET_Y, TILE, TILE);
}

function drawMenuButton(text) {
  ctx.fillStyle = "green";
  ctx.fillRect(180, 300, 140, 50);
  ctx.fillStyle = "white";
  ctx.font = "bold 20px Arial";
  ctx.fillText(text, canvas.width / 2, 335);
}

// ===== 互動邏輯 =====

canvas.addEventListener("click",(e)=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const isBtnClicked = (mx >= 180 && mx <= 320 && my >= 300 && my <= 350);

  if (!gameStarted) {
    if (isBtnClicked) gameStarted = true;
    return;
  }

  if (showEndOverlay) {
    if (isBtnClicked) handleOverlayAction();
    return;
  }

  if(isAnimating || gameOver) return;

  const x = Math.floor(mx/TILE);
  const y = Math.floor((my-OFFSET_Y)/TILE);
  if(x<0 || x>=SIZE || y<0 || y>=SIZE) return;

  const tile = board[y][x];
  if(!tile) return;

  if(pendingSkill) { handleSkillTrigger(x,y); return; }
  if(pendingJake) { handleJakeTrigger(x,y); return; }
  if(pendingIndigo) { 
  handleIndigoTrigger(x,y); 
  return; 
}

  if(tile.special === "line4") { pendingSkill = {x,y}; return; }
  if(tile.special === "line5") { pendingJake = {x,y}; return; }
  if(tile.special === "T") { 
  pendingIndigo = {x,y}; 
  return; 
}

  if(!selected) { selected = {x,y}; }
  else {
    if(Math.abs(selected.x-x) + Math.abs(selected.y-y) === 1) {
      swap(selected, {x,y}); selected = null;
    } else {
      selected = {x,y};
    }
  }
});

// ===== 修正後的 關卡跳轉邏輯 =====
function handleOverlayAction() {
    showEndOverlay = false;
    // 這裡先不要重置 gameOver，等按下「開始挑戰」再重置

    if (overlayConfig.action === 'next') {
        // 點擊進入第二關按鈕
        stage = 2; // 關鍵：立刻切換 stage，讓計時器停止對第一關的監控
        showEndOverlay = true;
        overlayConfig = {
            title: "第 2 關：清理水母樂園",
            subtitle: "水母樂園充滿了塑膠垃圾！\n\n關卡目標：清除 100 個塑膠袋\n限制：40 步以內",
            btnText: "開始挑戰",
            action: 'startStage2'
        };
    } else if (overlayConfig.action === 'startStage2') {
        // 點擊任務說明頁的「開始挑戰」
        plasticCleared = 0;
        movesLeft = 40;
        gameOver = false; // 正式開始遊戲
        timeUp = false;
        initBoard();
    } else if (overlayConfig.action === 'retry') {
        stage = 1;
        score = 0;
        timeLeft = 60;
        gameOver = false;
        timeUp = false;
        initBoard();
    } else if (overlayConfig.action === 'reload') {
        location.reload();
    }
}

// ===== 遊戲機制 (消除、掉落、連鎖) 簡化示意 =====
// (此處保留你原本的邏輯函數：swap, findMatches, resolveLoop, dropTiles, destroyTile... 等)
// 注意：請確保在 resolveLoop 結尾處判斷 Stage 2 的勝負

function findMatches(){
  let groups=[];

  // 橫
  for(let y=0;y<SIZE;y++){
    let count=1;
    for(let x=1;x<SIZE;x++){
      if(!board[y][x]||!board[y][x-1]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y,x-1)){
  count = 1;
  continue;
}

      if(
  board[y][x] &&
  board[y][x-1] &&
  !board[y][x].special &&
  !board[y][x-1].special &&
  board[y][x].type === board[y][x-1].type
){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y,x-1-k]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([y,SIZE-1-k]);
      groups.push(g);
    }
  }

  // 直
  for(let x=0;x<SIZE;x++){
    let count=1;
    for(let y=1;y<SIZE;y++){
      if(!board[y][x]||!board[y-1][x]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y-1,x)){
  count = 1;
  continue;
}

      if(
  board[y][x] &&
  board[y-1][x] &&
  !board[y][x].special &&
  !board[y-1][x].special &&
  board[y][x].type === board[y-1][x].type
){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y-1-k,x]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([SIZE-1-k,x]);
      groups.push(g);
    }
  }

  return groups;
}

function resolveLoop() {
    let groups = mergeGroups(findMatches());

    // --- 分支：盤面已穩定，沒有更多匹配 ---
    if (groups.length === 0) {
        
        // 處理延遲觸發（Jake 或 Indigo 的爆炸）
        if (pendingJakeChains.length > 0 || pendingExplosions.length > 0) {
            // (這部分保留你原本的延遲邏輯)
            if(pendingJakeChains.length > 0){
                let j = pendingJakeChains.shift();
                let found = null;
                for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] === j.ref) found = {x, y};
                if(found) triggerJakeChain(found.y, found.x);
            }
            if(pendingExplosions.length > 0){
                let exp = pendingExplosions.shift();
                setTimeout(()=>{
                    let found = null;
                    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] === exp.ref) found = {x, y};
                    if(found) explode3x3(found.x, found.y);
                    setTimeout(()=>{ dropTiles(); setTimeout(resolveLoop, 150); }, 150);
                }, 200);
                return;
            }
        }

        // ⭐⭐⭐ [修正] 穩定後的勝負判定 ⭐⭐⭐
        if (stage === 2) {
            if (plasticCleared >= 100) {
                showResult(true); 
                return;
            } else if (movesLeft <= 0) {
                showResult(false); 
                return;
            }
        }

        // 結束動畫狀態
        ensurePlayable();
        isAnimating = false;
        combo = 0;
        comboCount = 0;
        lastSwap = null;
        pendingExplosions = [];
        return;
    }

    // --- 分支：處理消除 ---
    let group = groups[0];
    combo++;
    comboCount++;

    // ⭐⭐⭐ [修正] 直線優先邏輯 ⭐⭐⭐
    let rowCounts = {};
    let colCounts = {};
    group.forEach(([y, x]) => {
        rowCounts[y] = (rowCounts[y] || 0) + 1;
        colCounts[x] = (colCounts[x] || 0) + 1;
    });

    // 找出該群組中在同一行或同一列的最大連續數
    let maxLine = Math.max(
        ...Object.values(rowCounts), 
        ...Object.values(colCounts)
    );

    let base = 0;
    let special = null;

    // 優先判定直線長度，不論是否有旁支
    if (maxLine >= 5) {
        base = 35;
        special = "line5"; // 生成 Jake
   } else if (group.length >= 5 || (new Set(group.map(p=>p[0])).size >= 2 && new Set(group.map(p=>p[1])).size >= 2)) {
        // T型、L型且長度不足5
        base = 25;
        special = "T"; // 生成 Indigo
   } else if (maxLine === 4) {
        base = 20;
        special = "line4"; // 生成 Shorty
    
    } else {
        base = 10;
    }

    score += base;

    // 計算文字浮動位置
    let avgX = 0, avgY = 0;
    group.forEach(([y, x]) => { avgX += x; avgY += y; });
    addFloatingText((avgX/group.length)*TILE, (avgY/group.length)*TILE+OFFSET_Y, "+" + base);

    // 決定特殊方塊生成位置 (優先用玩家交換的位置)
    let cy, cx;
    if (lastSwap) {
        let [a, b] = lastSwap;
        if (group.some(([y, x]) => y === a.y && x === a.x)) { cy = a.y; cx = a.x; }
        else if (group.some(([y, x]) => y === b.y && x === b.x)) { cy = b.y; cx = b.x; }
        else { let center = group[Math.floor(group.length / 2)]; cy = center[0]; cx = center[1]; }
    } else {
        let center = group[Math.floor(group.length / 2)];
        cy = center[0]; cx = center[1];
    }

    let originalType = board[cy][cx] ? board[cy][cx].type : Math.floor(Math.random() * TYPES);

    // 執行消除
    group.forEach(([y, x]) => {
        if (y === cy && x === cx) return;
        destroyTile(y, x);
    });

    // 生成特殊方塊或刪除中心
    if (special) {
        board[cy][cx] = { type: originalType, special: special };
        justCreatedSpecial = { y: cy, x: cx };
    } else {
        destroyTile(cy, cx);
    }

    draw();

    // 掉落與遞迴
    setTimeout(() => {
        dropTiles();
        draw();
        setTimeout(resolveLoop, 150);
    }, 150);

    justCreatedSpecial = null;
    explodingNow.clear();

    // 消除途中若已達標也可立即判定
    if (stage === 2 && plasticCleared >= 100) {
        showResult(true);
    }
}

// ... 此處省略你原本的 findMatches, resolveLoop 等長函數，請維持原本程式碼內容 ...
// ... 但請確保在 resolveLoop 判定勝利的地方呼叫 showResult() ...

// 這裡提供你原本 resolveLoop 中需要修正的 Stage 2 判斷點：
/*
  if(stage === 2){
    if(plasticCleared >= 100){ showResult(true); return; }
    if(movesLeft <= 0 && !isAnimating){ showResult(false); return; }
  }
*/

// ===== 定時器與迴圈 =====

function startTimer(){
  setInterval(()=>{
    // 關鍵修正：如果正在顯示遮罩(Overlay)或是已經不是第一關，計時器就不準再觸發第一關結算
    if(!gameStarted || gameOver || stage !== 1 || showEndOverlay) return;

    if(timeLeft > 0){
      timeLeft--;
    }

    if (timeLeft <= 0 && !isAnimating) {
        gameOver = true;
        showEndOverlay = true; 

        if (score >= 800) {
            overlayConfig = {
                title: "任務完成！",
                subtitle: "你阻止了原生珊瑚礁繼續白化!\n分數: " + score,
                btnText: "進入第二關",
                action: "next"
            };
        } else {
            overlayConfig = {
                title: "任務失敗！",
                subtitle: "原生珊瑚礁白化加速，請再接再厲!\n分數: " + score,
                btnText: "重新挑戰",
                action: "retry"
            };
        }
    }
  }, 1000);
}

function showResult(success) {
    gameOver = true;
    showEndOverlay = true;
    if (success) {
        overlayConfig = {
            title: "任務完成！",
            subtitle: "你拯救了水母樂園！",
            btnText: "再玩一次",
            action: "reload"
        };
    } else {
        overlayConfig = {
            title: "任務失敗！",
            subtitle: "水母樂園充斥著塑膠垃圾...",
            btnText: "重新開始",
            action: "reload"
        };
    }
}

function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== 掉落 =====
function dropTiles(){
  for(let x=0;x<SIZE;x++){
    let col=[];
for(let y=SIZE-1;y>=0;y--){
      if(board[y][x]) {
        delete board[y][x]._triggered; // ⭐ 重置
        col.push(board[y][x]);
      }
    }
    while(col.length<SIZE) col.push(randomTile());

    for(let y=SIZE-1;y>=0;y--){
      board[y][x]=col[SIZE-1-y];
    }
  }
}

function destroyTile(y, x){

  const tile = board[y]?.[x];
  if(!tile) return;

  // ⭐ 防止重複觸發
  if(tile._triggered) return;
  tile._triggered = true;

  // ⭐ Stage 2 計數
  if(stage === 2 && tile.type === PLASTIC){
    plasticCleared++;
  }

  // ⭐ 特殊方塊觸發（先觸發）
  /*if(tile.special === "line4"){
    triggerRandomLine(y, x);
  }*/
// ❌ Indigo 不在 destroyTile 自動觸發
// 👉 完全移除這段
  if(tile.special === "line5"){
    triggerJakeChain(y, x); // ⭐ ⭐ ⭐ 直接觸發
  }

  // ⭐ 最後才刪除
  board[y][x] = null;
}

function handleSkillTrigger(x,y){

  if(stage === 2){
    movesLeft--; // ⭐ 加這行
  }

  const {x:sx, y:sy} = pendingSkill;

  // ===== 不同行列 → 取消 =====
  if(x !== sx && y !== sy){
    pendingSkill = null;
    return;
  }

  isAnimating = true;

  // ===== 決定清行 or 清列 =====
  let cleared = [];

  if(y === sy){
    // 同一行
    for(let i=0;i<SIZE;i++){
      cleared.push([sy, i]);
    }
  }else{
    // 同一列
    for(let i=0;i<SIZE;i++){
      cleared.push([i, sx]);
    }
  }

  // ===== 消除 =====
cleared.forEach(([yy,xx])=>{

  if(stage === 2 && board[yy][xx]?.type === PLASTIC){
    plasticCleared++;
  }

  destroyTile(yy, xx); // ⭐ 改這裡
});

// ⭐ 先取消特殊屬性，避免二次觸發
if(board[sy][sx]){
  board[sy][sx].special = null;
}

// 再刪除
destroyTile(sy, sx);

  // ===== 分數（你可以調整）=====
  let gain = (cleared.length - 1) * 5;
  score += gain;

  addFloatingText(
    sx*TILE,
    sy*TILE+OFFSET_Y,
    "LINE +" + gain
  );

  pendingSkill = null;

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}

function triggerIndigo(x, y){

if(stage === 2){
    movesLeft--; // ⭐ 加這行
  }

  const tile = board[y][x];

  // 防止重複加入
  if(pendingExplosions.some(p => p.ref === tile)){
    return;
  }

  isAnimating = true;

  explodeAroundKeepCenter(x, y);

  pendingExplosions.push({
    ref: tile // ⭐ 改這裡
  });

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}

function handleJakeTrigger(x,y){
  if(stage === 2){
    movesLeft--; 
  }
  
  const {x:sx, y:sy} = pendingJake;

  // 不是周圍 → 當作重新選
  if(!isAdjacent(sx,sy,x,y)){
    pendingJake = null;
    selected = {x,y};
    return;
  }

  const target = board[y]?.[x];

  // 只能點普通方塊
  if(!target || target.special){
    pendingJake = null;
    return;
  }

  isAnimating = true;

  const targetType = target.type;
  let cleared = [];

  // ===== 找全盤同色，但排除特殊方塊 =====
  for(let yy=0; yy<SIZE; yy++){
    for(let xx=0; xx<SIZE; xx++){
      // ⭐ 關鍵修正：必須同時符合 [顏色相同] 且 [不是特殊方塊]
      if(board[yy][xx] && 
         board[yy][xx].type === targetType && 
         !board[yy][xx].special){ 
        cleared.push([yy,xx]);
      }
    }
  }

  // ===== 清除 =====
  cleared.forEach(([yy,xx])=>{
    destroyTile(yy, xx); 
  });

  // 移除 Jake 本身
  destroyTile(sy, sx);

  let gain = cleared.length * 10;
  score += gain;

  addFloatingText(sx*TILE, sy*TILE+OFFSET_Y, "COLOR +" + gain);

  pendingJake = null;

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop, 150);
  }, 150);
}

// ===== 交換 =====
function swap(a,b){
  isAnimating = true;

  combo = 0;
  comboCount = 0;

  lastSwap = [a, b];

  // 先交換
  [board[a.y][a.x], board[b.y][b.x]] =
  [board[b.y][b.x], board[a.y][a.x]];

  setTimeout(()=>{

    let matches = findMatches();

    if(matches.length === 0){

      // ❌ 無效交換 → 換回去
      [board[a.y][a.x], board[b.y][b.x]] =
      [board[b.y][b.x], board[a.y][a.x]];

      isAnimating = false;

    }else{

      // ✅ 有成功消除 → 才扣步數
      if(stage === 2){
        movesLeft--;
      }

      resolveLoop();
    }

  },150);
}

function mergeGroups(groups){
  let merged=[];

  groups.forEach(group=>{
    let added=false;

    for(let m of merged){
      if(group.some(([y,x]) =>
        m.some(([y2,x2]) => y===y2 && x===x2)
      )){
        m.push(...group);
        added=true;
        break;
      }
    }

    if(!added){
      merged.push([...group]);
    }
  });

  // 去重
  return merged.map(group=>{
    let set=new Set(group.map(([y,x])=>y+"_"+x));
    return Array.from(set).map(s=>{
      let [y,x]=s.split("_").map(Number);
      return [y,x];
    });
  });
}

function isJustCreated(y,x){
  return justCreatedSpecial &&
         justCreatedSpecial.y === y &&
         justCreatedSpecial.x === x;
}

function addFloatingText(x, y, text){
  floatingTexts.push({
    x: x,
    y: y,
    text: text,
    life: 60,        // 幀數（約1秒）
    vy: -0.5         // 往上速度
  });
}

function randomTile(){
  return {
    type: Math.floor(Math.random()*TYPES),
    special: null
  };
}

function explodeAroundKeepCenter(cx,cy){

  let hit = 0; // ⭐ 新增

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){

      let x = cx + dx;
      let y = cy + dy;

      if(x<0||x>=SIZE||y<0||y>=SIZE) continue;
      if(x===cx && y===cy) continue;

      if(board[y][x]){ // ⭐ 有東西才算
        hit++;
      }

      destroyTile(y,x);
    }
  }

  let gain = hit * 5; // ⭐ 改這裡
  score += gain;

  addFloatingText(
    cx*TILE,
    cy*TILE+OFFSET_Y,
    "BOOM +" + gain
  );
}

function explode3x3(cx,cy){

  let cleared = [];

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){

      let x = cx + dx;
      let y = cy + dy;

      if(x<0||x>=SIZE||y<0||y>=SIZE) continue;

      cleared.push([y,x]);
    }
  }

  cleared.forEach(([y,x])=>{

    if(stage === 2 && board[y][x]?.type === PLASTIC){
  plasticCleared++;
}

    destroyTile(y, x);
  });

  let gain = (cleared.length - 1) * 5;
  score += gain;

  addFloatingText(
    cx*TILE,
    cy*TILE+OFFSET_Y,
    "BOOM +" + gain
  );
}

function triggerRandomLine(y,x){

  let isRow = Math.random() < 0.5;

  if(isRow){
    for(let i=0;i<SIZE;i++){
      if(i!==x) destroyTile(y,i);
    }
  }else{
    for(let i=0;i<SIZE;i++){
      if(i!==y) destroyTile(i,x);
    }
  }
}

function isAdjacent(sx,sy,x,y){
  return Math.abs(sx-x)<=1 && Math.abs(sy-y)<=1 && !(sx===x && sy===y);
}

function triggerJakeChain(y,x){
  let neighbors = [];

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      let nx = x + dx;
      let ny = y + dy;
      if(nx<0||nx>=SIZE||ny<0||ny>=SIZE) continue;
      if(nx===x && ny===y) continue;

      if(board[ny][nx] && !board[ny][nx].special){
        neighbors.push([ny,nx]);
      }
    }
  }

  if(neighbors.length === 0) return;

  let [ty,tx] = neighbors[Math.floor(Math.random()*neighbors.length)];
  let targetType = board[ty][tx].type;

  for(let yy=0; yy<SIZE; yy++){
    for(let xx=0; xx<SIZE; xx++){
      // ⭐ 關鍵修正：自動連鎖時也排除特殊方塊
      if(board[yy][xx] && 
         board[yy][xx].type === targetType && 
         !board[yy][xx].special){
        destroyTile(yy,xx);
      }
    }
  }
}

function handleIndigoTrigger(x,y){

  const {x:sx, y:sy} = pendingIndigo;

  // ❌ 點自己 → 取消
  if(x === sx && y === sy){
    pendingIndigo = null;
    return;
  }

  // ❌ 不在九宮格 → 取消
  if(!isAdjacent(sx, sy, x, y)){
    pendingIndigo = null;
    selected = {x,y};
    return;
  }

  if(stage === 2){
    movesLeft--;
  }

  const tile = board[sy]?.[sx];
  if(!tile || tile.special !== "T"){
    pendingIndigo = null;
    return;
  }

  isAnimating = true;

  // ⭐ 觸發爆炸（第一段）
  explodeAroundKeepCenter(sx, sy);

  // ⭐ 加入第二段爆炸隊列（你原本就有）
  pendingExplosions.push({
    ref: tile
  });

  // ❌ 不要刪自己！！！
  // destroyTile(sy, sx);

  pendingIndigo = null;

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}
