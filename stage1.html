<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消（完整版）</title>
<style>
body {
  background: #0b2a3c;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
canvas {
  background: #0e3f5a;
  border: 3px solid white;
}
</style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;

const PLASTIC = 0;

// ===== 圖片 =====
const images = [];
const imagePaths = [
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
  let img = new Image();
  img.src = imagePaths[i];
  img.onload = () => {
    loaded++;
    if (loaded === imagePaths.length) {
      initBoard();
      gameLoop();
      startTimer();
    }
  };
  images.push(img);
}

// ===== 狀態 =====
let board = [];
let selected = null;
let isAnimating = false;

let score = 0;
let combo = 0;
let comboCount = 0;
let timeLeft = 60;
let gameOver = false;

let floatingTexts = [];

let lastSwap = null;

let timeUp = false;

let justCreatedSpecial = null;

let pendingSkill = null;

//let pendingExplosion = null;

let pendingJake = null;

let stage = 1;
let plasticCleared = 0;

let stageMessageTimer = 0;

let movesLeft = 50;

let stageResultMessage = "";
let stageResultTimer = 0;

let gameStarted = false;

let pendingExplosions = []; // ⭐ 取代 pendingExplosion

let pendingJakeChains = [];

function showStageMessage(){
  stageMessageTimer = 180; // 3秒
}

// ===== 初始化 =====

function hasPossibleMoves(){

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){

      let dirs = [
        [1,0],
        [0,1]
      ];

      for(let [dx,dy] of dirs){

        let nx = x + dx;
        let ny = y + dy;

        if(nx>=SIZE || ny>=SIZE) continue;

        // 模擬交換
        [board[y][x], board[ny][nx]] =
        [board[ny][nx], board[y][x]];

        let matches = findMatches();

        // 換回來
        [board[y][x], board[ny][nx]] =
        [board[ny][nx], board[y][x]];

        if(matches.length > 0){
          return true;
        }
      }
    }
  }

  return false;
}

function shuffleBoard(){

  let tiles = [];

  // 抽出所有 tile
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      tiles.push(board[y][x]);
    }
  }

  // 洗牌
  for(let i=tiles.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  // 塞回去
  let index = 0;
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      board[y][x] = tiles[index++];
    }
  }
}

function ensurePlayable(){

  while(true){

    if(findMatches().length === 0 && hasPossibleMoves()){
      return;
    }

    shuffleBoard();
  }
}

function initBoard(){
  board = [];

  for(let y=0;y<SIZE;y++){
    let row=[];

    for(let x=0;x<SIZE;x++){
      row.push(getSafeTile(x,y,row));
    }

    board.push(row);
  }
  ensurePlayable(); // ⭐ 加這行
}

function getSafeTile(x,y,row){

  let type;

  do{
    type = Math.floor(Math.random()*TYPES);

  }while(
    // 檢查橫向
    (x>=2 &&
     row[x-1].type === type &&
     row[x-2].type === type)

    ||

    // 檢查縱向
    (y>=2 &&
     board[y-1][x].type === type &&
     board[y-2][x].type === type)
  );

  return {
    type: type,
    special: null
  };
}

function addFloatingText(x, y, text){
  floatingTexts.push({
    x: x,
    y: y,
    text: text,
    life: 60,        // 幀數（約1秒）
    vy: -0.5         // 往上速度
  });
}

function randomTile(){
  return {
    type: Math.floor(Math.random()*TYPES),
    special: null
  };
}

// ===== 畫面 =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      drawTile(board[y][x],x,y);
    }
  }

  if(selected){
    ctx.strokeStyle="yellow";
    ctx.lineWidth=4;
    ctx.strokeRect(selected.x*TILE, selected.y*TILE+OFFSET_Y, TILE, TILE);
  }

  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.textAlign = "left";
 if(stage === 1){
  ctx.fillText("分數:"+score,0,34);
}else{
  ctx.fillText("已清除塑膠袋:"+plasticCleared+"/100",0,34);
}
  if(stage === 1){
  ctx.fillText("時間:"+timeLeft,0,84);
}else{
  ctx.fillText("剩餘步數:"+movesLeft,0,84);
}
  //ctx.fillText("Combo:"+combo,380,50);

  // ===== 浮動文字 =====
floatingTexts.forEach(ft=>{
  ctx.fillStyle = ft.text.includes("COMBO") ? "yellow" : "orange";
  ctx.font = "20px Arial";
  ctx.fillText(ft.text, ft.x, ft.y);

  ft.y += ft.vy;
  ft.life--;
});

// 移除消失的
floatingTexts = floatingTexts.filter(ft => ft.life > 0);

if(pendingSkill){
  ctx.strokeStyle = "red";
  ctx.lineWidth = 4;
  ctx.strokeRect(
    pendingSkill.x*TILE,
    pendingSkill.y*TILE+OFFSET_Y,
    TILE,TILE
  );
}

if(pendingJake){
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.strokeRect(
    pendingJake.x*TILE,
    pendingJake.y*TILE+OFFSET_Y,
    TILE,TILE
  );
}

if(stageMessageTimer > 0){

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.textAlign = "center";

  ctx.fillText("STAGE 2", canvas.width/2, 40);
  ctx.fillText("關卡目標: 清除100個塑膠袋!", canvas.width/2, 80);

  stageMessageTimer--;
}

if(stageResultTimer > 0){

  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.textAlign = "center";

  let lines = stageResultMessage.split("\n");

  lines.forEach((line, i)=>{
    ctx.fillText(line, canvas.width/2, 250 + i*30);
  });

  stageResultTimer--;
}

if(!gameStarted){

  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.textAlign = "center";

  ctx.fillText("關卡目標", canvas.width/2, 200);
  ctx.fillText("達到 800 分", canvas.width/2, 240);

  // 按鈕
  ctx.fillStyle = "green";
  ctx.fillRect(180, 300, 140, 50);

  ctx.fillStyle = "white";
  ctx.fillText("開始遊戲", canvas.width/2, 335);
}
}

function drawTile(tile,x,y){
  if(!tile) return;

  let img;
  if(tile.special==="line4") img=images[5];
  else if(tile.special==="T") img=images[6];
  else if(tile.special==="line5") img=images[7];
  else img=images[tile.type];

  ctx.drawImage(img,x*TILE,y*TILE+OFFSET_Y,TILE,TILE);
}

// ===== 點擊 =====
canvas.addEventListener("click",(e)=>{
  if(!gameStarted){

  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;

  // 按鈕範圍
  if(mx>=180 && mx<=320 && my>=300 && my<=350){
    gameStarted = true;
  }

  return;
}

  if(isAnimating || gameOver || (stage === 1 && timeUp)) return;

  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/TILE);
  const y=Math.floor((e.clientY-rect.top-OFFSET_Y)/TILE);

  const tile = board[y]?.[x];
  if(!tile) return;

  // ===== ⭐ 如果正在等技能觸發 =====
  if(pendingSkill){
    handleSkillTrigger(x,y);
    return;
  }

if(pendingJake){
  handleJakeTrigger(x,y);
  return;
}

  // ===== ⭐ 點到 Shorty → 進入技能模式 =====
  if(tile.special === "line4"){
    pendingSkill = {x,y};
    selected = null;
    return;
  }

// ===== 點到 Indigo =====
if(tile.special === "T"){

  // 第二次點同一顆 → 觸發
  if(selected &&
     selected.x === x &&
     selected.y === y){

    triggerIndigo(x,y);
    selected = null;
    return;
  }

  // 第一次點 → 當普通選取
  selected = {x,y};
  return;
}

// ===== 點到 Jake =====
if(tile.special === "line5"){

  pendingJake = {x,y};
  selected = null;
  return;
}

  // ===== 原本交換邏輯 =====
  if(!selected){
    selected={x,y};
  }else{
    let dx=Math.abs(selected.x-x);
    let dy=Math.abs(selected.y-y);

    if((dx===1&&dy===0)||(dx===0&&dy===1)){
      swap(selected,{x,y});
      selected=null;
    }else{
      selected={x,y};
    }
  }
});

function handleSkillTrigger(x,y){

  const {x:sx, y:sy} = pendingSkill;

  // ===== 不同行列 → 取消 =====
  if(x !== sx && y !== sy){
    pendingSkill = null;
    return;
  }

  isAnimating = true;

  // ===== 決定清行 or 清列 =====
  let cleared = [];

  if(y === sy){
    // 同一行
    for(let i=0;i<SIZE;i++){
      cleared.push([sy, i]);
    }
  }else{
    // 同一列
    for(let i=0;i<SIZE;i++){
      cleared.push([i, sx]);
    }
  }

  // ===== 消除 =====
cleared.forEach(([yy,xx])=>{

  if(stage === 2 && board[yy][xx]?.type === PLASTIC){
    plasticCleared++;
  }

  board[yy][xx] = null;
});

  // ===== 移除 Shorty 本身 =====
  board[sy][sx] = null;

  // ===== 分數（你可以調整）=====
  let gain = (cleared.length - 1) * 5;
  score += gain;

  addFloatingText(
    sx*TILE,
    sy*TILE+OFFSET_Y,
    "LINE +" + gain
  );

  pendingSkill = null;

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}

function explodeAroundKeepCenter(cx,cy){

  let hit = 0; // ⭐ 新增

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){

      let x = cx + dx;
      let y = cy + dy;

      if(x<0||x>=SIZE||y<0||y>=SIZE) continue;
      if(x===cx && y===cy) continue;

      if(board[y][x]){ // ⭐ 有東西才算
        hit++;
      }

      destroyTile(y,x);
    }
  }

  let gain = hit * 5; // ⭐ 改這裡
  score += gain;

  addFloatingText(
    cx*TILE,
    cy*TILE+OFFSET_Y,
    "BOOM +" + gain
  );
}

function triggerIndigo(x, y){

  const tile = board[y][x];

  // 防止重複加入
  if(pendingExplosions.some(p => p.ref === tile)){
    return;
  }

  isAnimating = true;

  explodeAroundKeepCenter(x, y);

  pendingExplosions.push({
    ref: tile // ⭐ 改這裡
  });

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}

function explode3x3(cx,cy){

  let cleared = [];

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){

      let x = cx + dx;
      let y = cy + dy;

      if(x<0||x>=SIZE||y<0||y>=SIZE) continue;

      cleared.push([y,x]);
    }
  }

  cleared.forEach(([y,x])=>{

    if(stage === 2 && board[y][x]?.type === PLASTIC){
  plasticCleared++;
}

    destroyTile(y, x);
  });

  let gain = (cleared.length - 1) * 5;
  score += gain;

  addFloatingText(
    cx*TILE,
    cy*TILE+OFFSET_Y,
    "BOOM +" + gain
  );
}

function triggerJakeChain(y,x){

  let neighbors = [];

  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){

      let nx = x + dx;
      let ny = y + dy;

      if(nx<0||nx>=SIZE||ny<0||ny>=SIZE) continue;
      if(nx===x && ny===y) continue;

      if(board[ny][nx] && !board[ny][nx].special){
        neighbors.push([ny,nx]);
      }
    }
  }

  if(neighbors.length === 0) return;

  let [ty,tx] = neighbors[Math.floor(Math.random()*neighbors.length)];
  let targetType = board[ty][tx].type;

  for(let yy=0; yy<SIZE; yy++){
    for(let xx=0; xx<SIZE; xx++){
      if(board[yy][xx] && board[yy][xx].type === targetType){
        destroyTile(yy,xx);
      }
    }
  }
}

function isAdjacent(sx,sy,x,y){
  return Math.abs(sx-x)<=1 && Math.abs(sy-y)<=1 && !(sx===x && sy===y);
}

function handleJakeTrigger(x,y){

  const {x:sx, y:sy} = pendingJake;

  // ⭐ 不是周圍 → 當作重新選
  if(!isAdjacent(sx,sy,x,y)){
    pendingJake = null;
    selected = {x,y};
    return;
  }

  const target = board[y]?.[x];

  // 只能點普通方塊
  if(!target || target.special){
    pendingJake = null;
    return;
  }

  isAnimating = true;

  const targetType = target.type;

  let cleared = [];

  // ===== 找全盤同色 =====
  for(let yy=0; yy<SIZE; yy++){
    for(let xx=0; xx<SIZE; xx++){

      if(board[yy][xx] &&
         board[yy][xx].type === targetType){

        cleared.push([yy,xx]);
      }
    }
  }

  // ===== 清除 =====
  cleared.forEach(([yy,xx])=>{

    if(stage === 2 && board[yy][xx]?.type === PLASTIC){
  plasticCleared++;
}

    board[yy][xx] = null;
  });

  // ===== 移除 Jake 本身 =====
  board[sy][sx] = null;

  // ===== 分數（可以調整）=====
  let gain = cleared.length * 10;
  score += gain;

  addFloatingText(
    sx*TILE,
    sy*TILE+OFFSET_Y,
    "COLOR +" + gain
  );

  pendingJake = null;

  setTimeout(()=>{
    dropTiles();
    setTimeout(resolveLoop,150);
  },150);
}

// ===== 交換 =====
function swap(a,b){
  isAnimating=true;

  if(stage === 2){
  movesLeft--;
}

  combo=0;
  comboCount=0;

  lastSwap = [a, b]; // ⭐ 記錄

  [board[a.y][a.x],board[b.y][b.x]] =
  [board[b.y][b.x],board[a.y][a.x]];

  setTimeout(()=>{
    let matches=findMatches();

    if(matches.length===0){
      [board[a.y][a.x],board[b.y][b.x]]=
      [board[b.y][b.x],board[a.y][a.x]];
      isAnimating=false;
    }else{
      resolveLoop();
    }
  },150);
}

function mergeGroups(groups){
  let merged=[];

  groups.forEach(group=>{
    let added=false;

    for(let m of merged){
      if(group.some(([y,x]) =>
        m.some(([y2,x2]) => y===y2 && x===x2)
      )){
        m.push(...group);
        added=true;
        break;
      }
    }

    if(!added){
      merged.push([...group]);
    }
  });

  // 去重
  return merged.map(group=>{
    let set=new Set(group.map(([y,x])=>y+"_"+x));
    return Array.from(set).map(s=>{
      let [y,x]=s.split("_").map(Number);
      return [y,x];
    });
  });
}

function isJustCreated(y,x){
  return justCreatedSpecial &&
         justCreatedSpecial.y === y &&
         justCreatedSpecial.x === x;
}

// ===== 找三消（安全版）=====
function findMatches(){
  let groups=[];

  // 橫
  for(let y=0;y<SIZE;y++){
    let count=1;
    for(let x=1;x<SIZE;x++){
      if(!board[y][x]||!board[y][x-1]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y,x-1)){
  count = 1;
  continue;
}

      if(
  board[y][x] &&
  board[y][x-1] &&
  !board[y][x].special &&
  !board[y][x-1].special &&
  board[y][x].type === board[y][x-1].type
){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y,x-1-k]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([y,SIZE-1-k]);
      groups.push(g);
    }
  }

  // 直
  for(let x=0;x<SIZE;x++){
    let count=1;
    for(let y=1;y<SIZE;y++){
      if(!board[y][x]||!board[y-1][x]){
        count=1; continue;
      }

if(isJustCreated(y,x) || isJustCreated(y-1,x)){
  count = 1;
  continue;
}

      if(
  board[y][x] &&
  board[y-1][x] &&
  !board[y][x].special &&
  !board[y-1][x].special &&
  board[y][x].type === board[y-1][x].type
){
        count++;
      }else{
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([y-1-k,x]);
          groups.push(g);
        }
        count=1;
      }
    }
    if(count>=3){
      let g=[];
      for(let k=0;k<count;k++) g.push([SIZE-1-k,x]);
      groups.push(g);
    }
  }

  return groups;
}

function triggerRandomLine(y,x){

  let isRow = Math.random() < 0.5;

  if(isRow){
    for(let i=0;i<SIZE;i++){
      if(i!==x) destroyTile(y,i);
    }
  }else{
    for(let i=0;i<SIZE;i++){
      if(i!==y) destroyTile(i,x);
    }
  }
}

function destroyTile(y, x){

  const tile = board[y]?.[x];
  if(!tile) return;

  // ⭐ Stage 2 計數
  if(stage === 2 && tile.type === PLASTIC){
    plasticCleared++;
  }

  // ⭐ 特殊方塊觸發
  if(tile.special === "line4"){
    triggerRandomLine(y, x);
  }
  else if(tile.special === "T"){
  // ⭐ 被動觸發才加入（避免手動觸發重複加入）
  if(!pendingExplosions.some(p => p.ref === tile)){
    pendingExplosions.push({
      ref: tile   // ⭐ 用物件追蹤，不用座標
    });
  }
}
  else if(tile.special === "line5"){
  pendingJakeChains.push({y, x});
}

  // ⭐ 最後才刪除
  board[y][x] = null;
}

function findIndigoPosition(){

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      if(board[y][x] &&
         board[y][x].special === "T"){
        return {x, y};
      }
    }
  }

  return null;
}

// ===== 核心連鎖流程 =====
function resolveLoop(){

  let groups=mergeGroups(findMatches());

  if(groups.length===0){
    
  // ===== ⭐ Jake 延遲觸發 =====
if(pendingJakeChains.length > 0){

  let j = pendingJakeChains.shift();

  setTimeout(()=>{

    triggerJakeChain(j.y, j.x);

    setTimeout(()=>{
      dropTiles();
      setTimeout(resolveLoop,150);
    },150);

  },200);

  return;
}
  
    // ===== ⭐ Indigo 第二段爆炸 =====
if(pendingExplosions.length > 0){

  let exp = pendingExplosions.shift(); // ⭐ 取出一顆

  setTimeout(()=>{

    // ⭐ 找這顆 tile 現在的位置
    let found = null;

    for(let y=0;y<SIZE;y++){
      for(let x=0;x<SIZE;x++){
        if(board[y][x] === exp.ref){
          found = {x, y};
        }
      }
    }

    if(found){
      explode3x3(found.x, found.y);
    }

    setTimeout(()=>{
      dropTiles();
      setTimeout(resolveLoop,150);
    },150);

  },200);

  return;
}

    if(comboCount>=2){
  let bonus = comboCount*10;
  score += bonus;

  addFloatingText(200, 50, "COMBO +" + bonus);
}


    ensurePlayable(); // ⭐ 防死局

    isAnimating=false;
    combo=0;
    comboCount=0;
    lastSwap = null;

    pendingExplosions = [];

    return;
  }

  let group=groups[0];

  combo++;
  comboCount++;

  let ys=group.map(p=>p[0]);
  let xs=group.map(p=>p[1]);

  let uniqueY=new Set(ys).size;
  let uniqueX=new Set(xs).size;

  let base=0;
  let special=null;

  // ⭐ 先判「純直線」
if(group.length>=5 && (uniqueX===1 || uniqueY===1)){
  base=35;
  special="line5";
}
else if(group.length===4 && (uniqueX===1 || uniqueY===1)){
  base=20;
  special="line4";
}

// ⭐ 再判「T / L / 十字」
else if(group.length>=4 && uniqueX>=2 && uniqueY>=2){
  base=25;
  special="T";
}

// ⭐ 最後才是普通三消
else{
  base=10;
}

  score+=base;

  let avgX = 0;
let avgY = 0;

group.forEach(([y,x])=>{
  avgX += x;
  avgY += y;
});

avgX /= group.length;
avgY /= group.length;

addFloatingText(
  avgX * TILE,
  avgY * TILE + OFFSET_Y,
  "+" + base
);

  let cy, cx;

// ⭐ 優先用玩家交換位置
if(lastSwap){
  let [a,b] = lastSwap;

  if(group.some(([y,x])=>y===a.y && x===a.x)){
    cy = a.y;
    cx = a.x;
  }
  else if(group.some(([y,x])=>y===b.y && x===b.x)){
    cy = b.y;
    cx = b.x;
  }
  else{
    // fallback（連鎖時用）
    let center = group[Math.floor(group.length/2)];
    cy = center[0];
    cx = center[1];
  }
}else{
  let center = group[Math.floor(group.length/2)];
  cy = center[0];
  cx = center[1];
}
  let original = board[cy][cx] ? board[cy][cx].type : Math.floor(Math.random()*TYPES);

  group.forEach(([y,x])=>{

  if(stage === 2 && board[y][x]?.type === PLASTIC){
    plasticCleared++;
  }

});

group.forEach(([y,x])=>{
  if(y===cy&&x===cx) return;
  board[y][x]=null;
});

  if(special){
    board[cy][cx]={type:original,special};
    justCreatedSpecial = {y:cy, x:cx}; // ⭐ 記錄
  }else{
    board[cy][cx]=null;
  }

  draw();

  setTimeout(()=>{
    dropTiles();
    draw();

    setTimeout(resolveLoop,150);
  },150);

  justCreatedSpecial = null;

  if(stage === 2 && movesLeft <= 0 && !gameOver){
  gameOver = true;
  setTimeout(()=>{
    alert("步數用完！目前清除:"+plasticCleared);
  },200);
}

  if(stage === 2 && plasticCleared >= 100){
  gameOver = true;
  setTimeout(()=>{
    alert("任務完成！你拯救了海洋 🌊");
  },200);
}
}

// ===== 掉落 =====
function dropTiles(){
  for(let x=0;x<SIZE;x++){
    let col=[];
    for(let y=SIZE-1;y>=0;y--){
      if(board[y][x]) col.push(board[y][x]);
    }
    while(col.length<SIZE) col.push(randomTile());

    for(let y=SIZE-1;y>=0;y--){
      board[y][x]=col[SIZE-1-y];
    }
  }
}

// ===== LOOP =====
function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== 計時 =====
function startTimer(){

  setInterval(()=>{

    if(!gameStarted) return; // ⭐ 改放這裡

    if(gameOver) return;
    if(stage === 2) return;

    if(timeLeft > 0){
      timeLeft--;
    }

    if(timeLeft <= 0){
      timeLeft = 0;
      timeUp = true;

      if(!isAnimating){

        gameOver = true;

        if(score >= 800){
          stageResultMessage =
            "任務完成！你阻止了原生珊瑚礁繼續白化!\n你的分數:" + score;
        }else{
          stageResultMessage =
            "任務失敗！原生珊瑚礁白化加速，請再接再厲!\n你的分數:" + score;
        }

        stageResultTimer = 180;

        setTimeout(()=>{
          if(score >= 800){

            stage = 2;
            initBoard();

            plasticCleared = 0;

            pendingExplosions = [];
            pendingSkill = null;
            pendingJake = null;

            movesLeft = 50;

            timeUp = false;
            gameOver = false;

            showStageMessage();
          }
        },3000);
      }
    }

  },1000);
}
</script>
