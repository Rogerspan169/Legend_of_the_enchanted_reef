<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>海洋三消（完整版）</title>
  <style>
    body {
      background: #0b2a3c;
      display: flex;
      justify-content: center;
      margin-top: 20px;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #0e3f5a;
      border: 3px solid white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;
const PLASTIC = 0;

// ===== 圖片載入 =====
const images = [];
const imagePaths = [
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
  "https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
  let img = new Image();
  img.src = imagePaths[i];
  img.onload = () => {
    loaded++;
    if (loaded === imagePaths.length) {
      initBoard();
      gameLoop();
      startTimer();
    }
  };
  images.push(img);
}

// ===== 遊戲狀態 =====
let board = [];
let selected = null;
let isAnimating = false;
let score = 0;
let comboCount = 0; 
let timeLeft = 60;
let gameOver = false;
let floatingTexts = [];
let lastSwap = null;
let timeUp = false;
let justCreatedSpecial = null;
let pendingSkill = null;
let pendingJake = null;
let pendingIndigo = null;
let stage = 1;
let plasticCleared = 0;
let stageMessageTimer = 0;
let movesLeft = 40;
let gameStarted = false;
let pendingExplosions = [];
let explodingNow = new Set();
let pendingJakeChains = [];

let showEndOverlay = false; 
let overlayConfig = { title: "", subtitle: "", btnText: "", action: "" };

// ===== 核心功能 =====
function initBoard(){
  board = [];
  for(let y=0;y<SIZE;y++){
    let row=[];
    for(let x=0;x<SIZE;x++) row.push(getSafeTile(x,y,row));
    board.push(row);
  }
  ensurePlayable();
}

function getSafeTile(x,y,row){
  let type;
  do {
    type = Math.floor(Math.random()*TYPES);
  } while(
    (x>=2 && row[x-1].type === type && row[x-2].type === type) ||
    (y>=2 && board[y-1][x].type === type && board[y-2][x].type === type)
  );
  return { type, special: null };
}

function ensurePlayable(){
  while(findMatches().length !== 0 || !hasPossibleMoves()) shuffleBoard();
}

function hasPossibleMoves(){
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      let dirs = [[1,0],[0,1]];
      for(let [dx,dy] of dirs){
        let nx = x + dx, ny = y + dy;
        if(nx>=SIZE || ny>=SIZE) continue;
        [board[y][x], board[ny][nx]] = [board[ny][nx], board[y][x]];
        let matches = findMatches();
        [board[y][x], board[ny][nx]] = [board[ny][nx], board[y][x]];
        if(matches.length > 0) return true;
      }
    }
  }
  return false;
}

function shuffleBoard(){
  let tiles = [];
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) tiles.push(board[y][x]);
  for(let i=tiles.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  let index = 0;
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) board[y][x] = tiles[index++];
}

// ===== 繪製邏輯 =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      drawTile(board[y][x], x, y);
    }
  }

  if(selected){
    ctx.strokeStyle="yellow"; ctx.lineWidth=4;
    ctx.strokeRect(selected.x*TILE, selected.y*TILE+OFFSET_Y, TILE, TILE);
  }

  ctx.fillStyle="white"; ctx.font="18px Arial"; ctx.textAlign = "left";
  if(stage === 1){
    ctx.fillText("分數: " + score, 10, 34); ctx.fillText("時間: " + timeLeft, 10, 74);
  } else {
    // ⭐ 第二關 UI：同時顯示分數、目標與步數
    ctx.fillText("分數: " + score, 10, 34);
    ctx.fillText("已清除塑膠袋: " + plasticCleared + "/100", 250, 34); // 移到右側
    ctx.fillText("剩餘步數: " + movesLeft, 10, 74);
  }

  floatingTexts.forEach(ft=>{
    ctx.fillStyle = ft.text.includes("COMBO") ? "yellow" : "orange";
    ctx.font = ft.text.includes("COMBO") ? "bold 24px Arial" : "20px Arial";
    ctx.fillText(ft.text, ft.x, ft.y); ft.y += ft.vy; ft.life--;
  });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  if(pendingSkill) drawHighlight(pendingSkill.x, pendingSkill.y, "red");
  if(pendingJake) drawHighlight(pendingJake.x, pendingJake.y, "black");
  if(pendingIndigo) drawHighlight(pendingIndigo.x, pendingIndigo.y, "blue");

  if (!gameStarted || showEndOverlay) {
    ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white"; ctx.textAlign = "center";
    if (!gameStarted) {
      ctx.font = "24px Arial"; ctx.fillText("第 1 關：阻止原生珊瑚礁繼續白化", canvas.width / 2, 140);
      ctx.font = "18px Arial"; ctx.fillText("目標：達到 800 分", canvas.width / 2, 200);
      drawMenuButton("開始遊戲");
    } else if (showEndOverlay) {
      ctx.font = "24px Arial"; ctx.fillText(overlayConfig.title, canvas.width / 2, 140);
      ctx.font = "18px Arial";
      let lines = overlayConfig.subtitle.split("\n");
      lines.forEach((line, i) => ctx.fillText(line, canvas.width / 2, 200 + i * 30));
      drawMenuButton(overlayConfig.btnText);
    }
  }
}

function drawTile(tile,x,y){
  if(!tile) return;
  let img;
  if(tile.special==="line4") img=images[5];
  else if(tile.special==="T") img=images[6];
  else if(tile.special==="line5") img=images[7];
  else img=images[tile.type];
  ctx.drawImage(img,x*TILE,y*TILE+OFFSET_Y,TILE,TILE);
}

function drawHighlight(x, y, color){
  ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.strokeRect(x*TILE, y*TILE+OFFSET_Y, TILE, TILE);
}

function drawMenuButton(text) {
  ctx.fillStyle = "green"; ctx.fillRect(180, 300, 140, 50);
  ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText(text, canvas.width / 2, 335);
}

// ===== 互動邏輯 =====
canvas.addEventListener("click",(e)=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const isBtnClicked = (mx >= 180 && mx <= 320 && my >= 300 && my <= 350);

  if (!gameStarted) { if (isBtnClicked) gameStarted = true; return; }
  if (showEndOverlay) { if (isBtnClicked) handleOverlayAction(); return; }
  if (isAnimating || gameOver) return;

  const x = Math.floor(mx/TILE);
  const y = Math.floor((my-OFFSET_Y)/TILE);
  if(x<0 || x>=SIZE || y<0 || y>=SIZE) return;

  const tile = board[y][x];
  if(!tile) return;

  if(pendingSkill) { handleSkillTrigger(x,y); return; }
  if(pendingJake) { handleJakeTrigger(x,y); return; }
  if(pendingIndigo) { handleIndigoTrigger(x,y); return; }

  if(tile.special === "line4") { pendingSkill = {x,y}; return; }
  if(tile.special === "line5") { pendingJake = {x,y}; return; }
  if(tile.special === "T") { pendingIndigo = {x,y}; return; }

  if(!selected) { selected = {x,y}; }
  else {
    if(Math.abs(selected.x-x) + Math.abs(selected.y-y) === 1) { swap(selected, {x,y}); selected = null; }
    else { selected = {x,y}; }
  }
});

function handleOverlayAction() {
    showEndOverlay = false; gameOver = false;
    if (overlayConfig.action === 'next') {
        stage = 2; showEndOverlay = true;
        overlayConfig = {
            title: "第 2 關：清理水母樂園",
            subtitle: "水母樂園充滿了塑膠垃圾！\n\n關卡目標：清除 100 個塑膠袋\n限制：40 步以內",
            btnText: "開始挑戰", action: 'startStage2'
        };
    } else if (overlayConfig.action === 'startStage2') {
        plasticCleared = 0; movesLeft = 40; initBoard();
    } else if (overlayConfig.action === 'retry') {
        stage = 1; score = 0; timeLeft = 60; initBoard();
    } else if (overlayConfig.action === 'reload') {
        location.reload();
    }
}

// ===== 核心消除邏輯 =====
function findMatches(){
  let groups=[];
  for(let y=0;y<SIZE;y++){
    let count=1;
    for(let x=1;x<SIZE;x++){
      if(board[y][x] && board[y][x-1] && !board[y][x].special && !board[y][x-1].special && board[y][x].type === board[y][x-1].type && !isJustCreated(y,x) && !isJustCreated(y,x-1)) count++;
      else { if(count>=3){ let g=[]; for(let k=0;k<count;k++) g.push([y,x-1-k]); groups.push(g); } count=1; }
    }
    if(count>=3){ let g=[]; for(let k=0;k<count;k++) g.push([y,SIZE-1-k]); groups.push(g); }
  }
  for(let x=0;x<SIZE;x++){
    let count=1;
    for(let y=1;y<SIZE;y++){
      if(board[y][x] && board[y-1][x] && !board[y][x].special && !board[y-1][x].special && board[y][x].type === board[y-1][x].type && !isJustCreated(y,x) && !isJustCreated(y-1,x)) count++;
      else { if(count>=3){ let g=[]; for(let k=0;k<count;k++) g.push([y-1-k,x]); groups.push(g); } count=1; }
    }
    if(count>=3){ let g=[]; for(let k=0;k<count;k++) g.push([SIZE-1-k,x]); groups.push(g); }
  }
  return groups;
}

function resolveLoop() {
    let groups = mergeGroups(findMatches());

    if (groups.length === 0) {
        if (comboCount >= 2) {
            let bonus = comboCount * 10;
            score += bonus;
            addFloatingText(200, 80, "COMBO +" + bonus);
        }
        comboCount = 0;

        if (pendingJakeChains.length > 0 || pendingExplosions.length > 0) {
            if(pendingJakeChains.length > 0){
                let j = pendingJakeChains.shift();
                let found = null;
                for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] === j.ref) found = {x, y};
                if(found) triggerJakeChain(found.y, found.x);
            }
            if(pendingExplosions.length > 0){
                let exp = pendingExplosions.shift();
                setTimeout(()=>{
                    let found = null;
                    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] === exp.ref) found = {x, y};
                    if(found) { 
                        explode3x3(found.x, found.y); 
                        board[found.y][found.x] = null; 
                    }
                    setTimeout(()=>{ dropTiles(); setTimeout(resolveLoop, 150); }, 150);
                }, 200);
                return;
            }
        }

        if (stage === 2) {
            if (plasticCleared >= 100) { showResult(true); return; }
            else if (movesLeft <= 0) { showResult(false); return; }
        }
        ensurePlayable(); isAnimating = false; lastSwap = null; return;
    }

    let group = groups[0];
    comboCount++;

    let rowCounts = {}, colCounts = {};
    group.forEach(([y, x]) => { 
        rowCounts[y] = (rowCounts[y] || 0) + 1; 
        colCounts[x] = (colCounts[x] || 0) + 1; 
    });
    let maxLine = Math.max(...Object.values(rowCounts), ...Object.values(colCounts));
    
    let base = 10, special = null;
    if (maxLine >= 5) { base = 35; special = "line5"; }
    else if (group.length >= 5 || (new Set(group.map(p=>p[0])).size >= 2 && new Set(group.map(p=>p[1])).size >= 2)) { base = 25; special = "T"; }
    else if (maxLine === 4) { base = 20; special = "line4"; }

    score += base;
    let avgX = 0, avgY = 0;
    group.forEach(([y, x]) => { avgX += x; avgY += y; });
    addFloatingText((avgX/group.length)*TILE, (avgY/group.length)*TILE+OFFSET_Y, "+" + base);

    let cy, cx;
    if (lastSwap) {
        let [a, b] = lastSwap;
        if (group.some(([y, x]) => y === a.y && x === a.x)) { cy = a.y; cx = a.x; }
        else if (group.some(([y, x]) => y === b.y && x === b.x)) { cy = b.y; cx = b.x; }
        else { cy = group[0][0]; cx = group[0][1]; }
    } else { cy = group[0][0]; cx = group[0][1]; }

    let originalType = board[cy][cx] ? board[cy][cx].type : 0;

    // ⭐ 核心修正：執行消除
    group.forEach(([y, x]) => {
        if (y === cy && x === cx) {
            // 中心點轉化：如果原本是塑膠袋，雖然不呼叫 destroyTile，但要手動計數
            if (stage === 2 && board[y][x]?.type === PLASTIC) {
                plasticCleared++;
            }
        } else {
            // 其他方塊正常銷毀並計數
            destroyTile(y, x);
        }
    });

    if (special) {
        board[cy][cx] = { type: originalType, special: special };
        justCreatedSpecial = { y: cy, x: cx };
    } else {
        board[cy][cx] = null; 
    }

    draw();
    setTimeout(() => {
        dropTiles();
        draw();
        setTimeout(resolveLoop, 150);
    }, 150);
    
    justCreatedSpecial = null;
    explodingNow.clear();
}

// ===== 技能與工具函式 =====
function destroyTile(row, col) {
  const tile = board[row]?.[col];
  if (!tile || tile._triggered) return;
  tile._triggered = true;

  // 第二關塑膠袋計數 (僅限普通方塊)
  if (stage === 2 && tile.type === PLASTIC && !tile.special) {
    plasticCleared++;
  }

  const spec = tile.special;

  if (spec === "line4") {
    // 被動連鎖 Shorty：將自己的 row, col 傳進去
    triggerRandomLine(row, col);
    board[row][col] = null;
  } 
  else if (spec === "T") {
    // 被動連鎖 Indigo
    explodeAroundKeepCenter(col, row);
    pendingExplosions.push({ ref: tile });
    // 注意：Indigo 暫時不設 null，等待 resolveLoop 第二次爆炸
  } 
  else if (spec === "line5") {
    // 被動連鎖 Jake
    triggerJakeChain(row, col);
    board[row][col] = null;
  } 
  else {
    // 普通方塊
    board[row][col] = null;
  }
}

function handleSkillTrigger(clickedX, clickedY) {
  if (stage === 2) movesLeft--;

  const { x: sx, y: sy } = pendingSkill;
  // 立刻重置，防止連鎖反應期間發生狀態混亂
  pendingSkill = null; 

  if (clickedX !== sx && clickedY !== sy) {
    return;
  }

  isAnimating = true;
  let clearedCoords = [];

  // 判定是橫向還是縱向
  if (clickedY === sy) {
    // 點擊位置與 Shorty 在同一橫排 -> 消橫排
    for (let i = 0; i < SIZE; i++) clearedCoords.push([sy, i]);
  } else {
    // 點擊位置與 Shorty 在同一直行 -> 消直行
    for (let i = 0; i < SIZE; i++) clearedCoords.push([i, sx]);
  }

  // 執行消除 (排除中心點，等等單獨處理)
  clearedCoords.forEach(([r, c]) => {
    if (r !== sy || c !== sx) {
      destroyTile(r, c);
    }
  });

  // 處理發動技能的這隻 Shorty 本身
  if (board[sy] && board[sy][sx]) {
    board[sy][sx].special = null; // 拔掉技能，防止重複觸發隨機射線
    destroyTile(sy, sx);
  }

  let gain = (clearedCoords.length - 1) * 5;
  score += gain;
  addFloatingText(sx * TILE, sy * TILE + OFFSET_Y, "LINE +" + gain);

  setTimeout(() => {
    dropTiles();
    setTimeout(resolveLoop, 150);
  }, 150);
}

function handleJakeTrigger(x,y){
  if(stage === 2) movesLeft--;
  const {x:sx, y:sy} = pendingJake;
  if(!isAdjacent(sx,sy,x,y)){ pendingJake = null; selected = {x,y}; return; }
  const target = board[y]?.[x];
  if(!target || target.special){ pendingJake = null; return; }
  isAnimating = true; const targetType = target.type; let cleared = [];
  for(let yy=0; yy<SIZE; yy++) for(let xx=0; xx<SIZE; xx++) if(board[yy][xx] && board[yy][xx].type === targetType && !board[yy][xx].special) cleared.push([yy,xx]);
  cleared.forEach(([yy,xx])=> destroyTile(yy, xx));
  if(board[sy][sx]) board[sy][sx].special = null;
  destroyTile(sy, sx);
  let gain = cleared.length * 5; score += gain;
  addFloatingText(sx*TILE, sy*TILE+OFFSET_Y, "COLOR +" + gain);
  pendingJake = null; setTimeout(()=>{ dropTiles(); setTimeout(resolveLoop, 150); }, 150);
}

function handleIndigoTrigger(x,y){
  const {x:sx, y:sy} = pendingIndigo;
  if(x === sx && y === sy) { pendingIndigo = null; return; }
  if(!isAdjacent(sx, sy, x, y)){ pendingIndigo = null; selected = {x,y}; return; }
  if(stage === 2) movesLeft--;
  const tile = board[sy]?.[sx];
  if(!tile || tile.special !== "T"){ pendingIndigo = null; return; }
  isAnimating = true; explodeAroundKeepCenter(sx, sy);
  pendingExplosions.push({ ref: tile }); pendingIndigo = null;
  setTimeout(()=>{ dropTiles(); setTimeout(resolveLoop,150); },150);
}

function triggerJakeChain(y,x){
  let neighbors = [];
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    let nx = x + dx, ny = y + dy;
    if(nx<0||nx>=SIZE||ny<0||ny>=SIZE||(nx===x && ny===y)) continue;
    if(board[ny][nx] && !board[ny][nx].special) neighbors.push([ny,nx]);
  }
  if(neighbors.length === 0) return;
  let [ty,tx] = neighbors[Math.floor(Math.random()*neighbors.length)];
  let targetType = board[ty][tx].type;
  for(let yy=0; yy<SIZE; yy++) for(let xx=0; xx<SIZE; xx++) if(board[yy][xx] && board[yy][xx].type === targetType && !board[yy][xx].special) destroyTile(yy,xx);
}

function explodeAroundKeepCenter(cx,cy){
  let hit = 0;
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    let x = cx + dx, y = cy + dy;
    if(x<0||x>=SIZE||y<0||y>=SIZE||(x===cx && y===cy)) continue;
    if(board[y][x]) hit++;
    destroyTile(y,x);
  }
  let gain = hit * 5; score += gain;
  addFloatingText(cx*TILE, cy*TILE+OFFSET_Y, "BOOM +" + gain);
}

function explode3x3(cx,cy){
  let hit = 0;
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    let x = cx + dx, y = cy + dy;
    if(x<0||x>=SIZE||y<0||y>=SIZE) continue;
    if(board[y][x]) hit++;
    destroyTile(y, x);
  }
  let gain = (hit - 1) * 5; score += gain;
  addFloatingText(cx*TILE, cy*TILE+OFFSET_Y, "BOOM +" + gain);
}

function triggerRandomLine(originRow, originCol) {
  const isRow = Math.random() < 0.5;

  if (isRow) {
    // 消除整橫排 (Row)
    for (let i = 0; i < SIZE; i++) {
      if (i !== originCol) {
        destroyTile(originRow, i); 
      }
    }
  } else {
    // 消除整直行 (Column)
    for (let i = 0; i < SIZE; i++) {
      if (i !== originRow) {
        destroyTile(i, originCol);
      }
    }
  }
}

function swap(a,b){
  isAnimating = true;
  [board[a.y][a.x], board[b.y][b.x]] = [board[b.y][b.x], board[a.y][a.x]];
  setTimeout(()=>{
    if(findMatches().length === 0){ [board[a.y][a.x], board[b.y][b.x]] = [board[b.y][b.x], board[a.y][a.x]]; isAnimating = false; }
    else { if(stage === 2) movesLeft--; lastSwap = [a, b]; resolveLoop(); }
  }, 150);
}

function mergeGroups(groups){
  let merged=[];
  groups.forEach(group=>{
    let added=false;
    for(let m of merged){ if(group.some(([y,x]) => m.some(([y2,x2]) => y===y2 && x===x2) )){ m.push(...group); added=true; break; } }
    if(!added) merged.push([...group]);
  });
  return merged.map(group=>{ let set=new Set(group.map(([y,x])=>y+"_"+x)); return Array.from(set).map(s=>{ let [y,x]=s.split("_").map(Number); return [y,x]; }); });
}

function dropTiles(){
  for(let x=0;x<SIZE;x++){
    let col=[];
    for(let y=SIZE-1;y>=0;y--) if(board[y][x]) { delete board[y][x]._triggered; col.push(board[y][x]); }
    while(col.length<SIZE) col.push(randomTile());
    for(let y=SIZE-1;y>=0;y--) board[y][x]=col[SIZE-1-y];
  }
}

function isJustCreated(y,x){ return justCreatedSpecial && justCreatedSpecial.y === y && justCreatedSpecial.x === x; }
function isAdjacent(sx,sy,x,y){ return Math.abs(sx-x)<=1 && Math.abs(sy-y)<=1 && !(sx===x && sy===y); }
// 修改此函數，增加 duration 參數，預設為 60 幀 (1秒)
function addFloatingText(x, y, text, duration = 60) {
  floatingTexts.push({
    x: x,
    y: y,
    text: text,
    life: duration, // 使用傳入的時間
    vy: -0.5
  });
}
function randomTile(){ return { type: Math.floor(Math.random()*TYPES), special: null }; }

function startTimer(){
  setInterval(()=>{
    if(!gameStarted || gameOver || stage !== 1 || showEndOverlay) return;
    if(timeLeft > 0) timeLeft--;
    if (timeLeft <= 0 && !isAnimating) {
        gameOver = true; showEndOverlay = true; 
        if (score >= 800) overlayConfig = { title: "任務完成！", subtitle: "你阻止了原生珊瑚礁繼續白化!\n分數: " + score, btnText: "進入第二關", action: "next" };
        else overlayConfig = { title: "任務失敗！", subtitle: "原生珊瑚礁白化加速，請再接再厲!\n分數: " + score, btnText: "重新挑戰", action: "retry" };
    }
  }, 1000);
}

function showResult(success) {
  gameOver = true; // 先停止遊戲操作

  if (success && stage === 2) {
    // 1. 計算步數獎勵
    let bonus = movesLeft * 50;
    score += bonus;

    // 2. ⭐ 將座標移至 (200, 80)，與 Combo 顯示位置一致
    // 設定停留時間為 180 幀 (約 3 秒)
    addFloatingText(200, 80, "剩餘步數 +" + bonus, 180);

    // 3. 等待 3 秒後再跳出結算黑底頁面
    setTimeout(() => {
      showEndOverlay = true;
      overlayConfig = {
        title: "任務完成！",
        subtitle: "你拯救了水母樂園！\n最終分數: " + score,
        btnText: "再玩一次",
        action: "reload"
      };
    }, 3000);

  } else {
    // 第一關過關或任何失敗情況，立即顯示畫面
    showEndOverlay = true;
    if (success) {
      // 第一關成功
      overlayConfig = {
        title: "任務完成！",
        subtitle: "你阻止了原生珊瑚礁繼續白化!\n分數: " + score,
        btnText: "進入第二關",
        action: "next"
      };
    } else {
      // 失敗邏輯
      overlayConfig = {
        title: "任務失敗！",
        subtitle: stage === 1 ? "原生珊瑚礁白化加速..." : "水母樂園充斥著塑膠垃圾...",
        btnText: stage === 1 ? "重新挑戰" : "重新開始",
        action: stage === 1 ? "retry" : "reload"
      };
    }
  }
}

function gameLoop(){ draw(); requestAnimationFrame(gameLoop); }

</script>
