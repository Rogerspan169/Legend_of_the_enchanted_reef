<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消遊戲</title>
<style>
  body {
    background: #0b2a3c;
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  canvas {
    background: #0e3f5a;
    border: 3px solid white;
  }
</style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;

// ===== 圖片載入 =====
const images = [];
const imagePaths = [
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
let img = new Image();
img.src = imagePaths[i];
img.onload = () => {
loaded++;
if (loaded === imagePaths.length) {
initBoard();
draw();
startTimer();
}
};
images.push(img);
}

// ===== 遊戲狀態 =====
let board = [];
let selected = null;
let isAnimating = false;

let score = 0;
let combo = 0;
let timeLeft = 60;
let gameOver = false;

let floatingTexts = [];

// ===== 初始化 =====
function initBoard() {
  board = [];
  for (let y = 0; y < SIZE; y++) {
    let row = [];
    for (let x = 0; x < SIZE; x++) {
      row.push(getSafeRandom(x, y, row));
    }
    board.push(row);
  }

  // ⭐ 清除初始連線
  function getSafeRandom(x, y, row) {
  let type;

  do {
    type = randomType();
  } while (
    // 檢查橫向
    (x >= 2 &&
     row[x-1] === type &&
     row[x-2] === type) ||

    // 檢查縱向
    (y >= 2 &&
     board[y-1][x] === type &&
     board[y-2][x] === type)
  );

  return type;
}
}

function randomType() {
return Math.floor(Math.random() * TYPES);
}

function addFloatingText(x, y, text) {
  floatingTexts.push({
    x: x,
    y: y,
    text: text,
    life: .5
  });
}

// ===== 畫面 =====
function draw() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

for (let y = 0; y < SIZE; y++) {
for (let x = 0; x < SIZE; x++) {
drawTile(board[y][x], x, y);
}
}

// 選取框
if (selected) {
ctx.strokeStyle = "yellow";
ctx.lineWidth = 5;
ctx.strokeRect(selected.x*TILE, selected.y*TILE + OFFSET_Y, TILE, TILE);
}

// UI
ctx.fillStyle = "white";
ctx.font = "18px Arial";
ctx.fillText("分數: " + score, 100, 50);
ctx.fillText("時間: " + timeLeft, 250, 50);
ctx.fillText("Combo: " + combo, 400, 50);

floatingTexts.forEach(ft => {
  ctx.fillStyle = "yellow";
  ctx.font = "20px Arial";
  ctx.fillText(ft.text, ft.x, ft.y);

  ft.y -= 1;     // 往上飄
  ft.life--;
});

// 移除消失的文字
floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function drawTile(type, x, y) {
if (type === null) return;
ctx.drawImage(images[type], x*TILE, y*TILE + OFFSET_Y, TILE, TILE);
}

// ===== 點擊交換 =====
//if (y < 0) return;//
canvas.addEventListener("click", (e) => {
if (isAnimating || gameOver) return;

const rect = canvas.getBoundingClientRect();
const x = Math.floor((e.clientX - rect.left) / TILE);
const y = Math.floor((e.clientY - rect.top - OFFSET_Y) / TILE);

if (!selected) {
selected = {x,y};
} else {
let dx = Math.abs(selected.x - x);
let dy = Math.abs(selected.y - y);


if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
  swap(selected, {x,y});
  selected = null;
} else {
  selected = {x,y};
}


}

draw();
});

// ===== 交換 =====
function swap(a,b) {
  isAnimating = true;
  combo = 0;
  turnScore = 0; // ⭐ 重置本回合分數
  baseScore = 0;

[board[a.y][a.x], board[b.y][b.x]] =
[board[b.y][b.x], board[a.y][a.x]];

setTimeout(()=>{
let matches = findMatchGroups();

if (matches.length === 0) {
// 換回來
[board[a.y][a.x], board[b.y][b.x]] =
[board[b.y][b.x], board[a.y][a.x]];


isAnimating = false; // ⭐ 保險解鎖
draw();


} else {
resolveMatches(true);
}
},200);

}

// ===== 找三消 =====
function findMatchGroups() {
  let mark = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
  let groups = [];

  // ===== 橫向 =====
  for (let y = 0; y < SIZE; y++) {
    let count = 1;

    for (let x = 1; x < SIZE; x++) {
      if (board[y][x] === board[y][x-1]) {
        count++;
      } else {
        if (count >= 3) {
          let group = [];
          for (let k = 0; k < count; k++) {
            group.push([y, x-1-k]);
            mark[y][x-1-k] = true;
          }
          groups.push(group);
        }
        count = 1;
      }
    }

    if (count >= 3) {
      let group = [];
      for (let k = 0; k < count; k++) {
        group.push([y, SIZE-1-k]);
        mark[y][SIZE-1-k] = true;
      }
      groups.push(group);
    }
  }

  // ===== 縱向 =====
  for (let x = 0; x < SIZE; x++) {
    let count = 1;

    for (let y = 1; y < SIZE; y++) {
      if (board[y][x] === board[y-1][x]) {
        count++;
      } else {
        if (count >= 3) {
          let group = [];
          for (let k = 0; k < count; k++) {
            group.push([y-1-k, x]);
            mark[y-1-k][x] = true;
          }
          groups.push(group);
        }
        count = 1;
      }
    }

    if (count >= 3) {
      let group = [];
      for (let k = 0; k < count; k++) {
        group.push([SIZE-1-k, x]);
        mark[SIZE-1-k][x] = true;
      }
      groups.push(group);
    }
  }

  return groups;
}

function mergeGroups(groups) {
  let merged = [];

  groups.forEach(group => {
    let added = false;

    for (let m of merged) {
      // 檢查是否有交集
      if (group.some(([y,x]) =>
          m.some(([y2,x2]) => y===y2 && x===x2)
      )) {
        m.push(...group);
        added = true;
        break;
      }
    }

    if (!added) {
      merged.push([...group]);
    }
  });

  // 去重複
  return merged.map(group => {
    let set = new Set(group.map(([y,x])=>y+"_"+x));
    return Array.from(set).map(s=>{
      let [y,x]=s.split("_").map(Number);
      return [y,x];
    });
  });
}

// ===== 判定群組分數 =====
function getGroupScore(group){
  let ys = group.map(p=>p[0]);
  let xs = group.map(p=>p[1]);

  let uniqueY = new Set(ys).size;
  let uniqueX = new Set(xs).size;

  let size = group.length;

  let turnScore = 0;
  let baseScore = 0; // ⭐ 累積基礎分

  // 五連直/橫
  if (size >= 5 && (uniqueX === 1 || uniqueY === 1)) return 35;

  // 四連直/橫
  if (size === 4 && (uniqueX === 1 || uniqueY === 1)) return 20;

  // T / L / 十字形：總數 >=4 且直橫至少各 2
  if (size >= 4 && uniqueX >= 2 && uniqueY >= 2) return 25;

  // 三消直/橫
  if (size === 3 && (uniqueX === 1 || uniqueY === 1)) return 10;

  // 其他情況不消
  return 0;
}

// ===== 消除 =====
// ===== 消除群組 =====
// ===== 消除群組 =====
let comboCount = 0; // 全域 combo 次數

function resolveMatches(isPlayer){
  let groups = mergeGroups(findMatchGroups());

  // ===== 沒有更多消除 → 回合結束 =====
  if(groups.length === 0){
    if(comboCount >= 2){
      let bonus = comboCount * 10;
      score += bonus;
      addFloatingText(200, 80, "COMBO +" + bonus);
    }

    isAnimating = false;
    combo = 0;
    comboCount = 0;
    return;
  }

  let group = groups[0];

  combo++;
  comboCount++;

  // ===== 判定形狀 =====
  let ys = group.map(p => p[0]);
  let xs = group.map(p => p[1]);
  let uniqueY = new Set(ys).size;
  let uniqueX = new Set(xs).size;

  let base = 0;

  // ⭐ T / L / 十字（優先判定！）
  if(group.length >= 4 && uniqueX >= 2 && uniqueY >= 2){
    base = 25;
  }
  // 五連
  else if(group.length >= 5 && (uniqueX === 1 || uniqueY === 1)){
    base = 35;
  }
  // 四連
  else if(group.length === 4 && (uniqueX === 1 || uniqueY === 1)){
    base = 20;
  }
  // 三消
  else if(group.length === 3 && (uniqueX === 1 || uniqueY === 1)){
    base = 10;
  }

  // ===== 加分 =====
  score += base;

  // ===== 浮動文字（群組中心）=====
  let avgX = 0, avgY = 0;
  group.forEach(([y,x])=>{
    avgX += x;
    avgY += y;
  });
  avgX /= group.length;
  avgY /= group.length;

  addFloatingText(
    avgX * TILE,
    avgY * TILE + OFFSET_Y,
    "+" + base
  );

  // ===== 消除 =====
  group.forEach(([y,x])=>{
    board[y][x] = null;
  });

  draw();

  // ===== 掉落 + 下一輪 =====
  setTimeout(()=>{
    dropTiles();
    draw();

    setTimeout(()=>{
      resolveMatches(false);
    }, 200);

  }, 200);
}

// ===== 掉落 =====
function dropTiles(){
for(let x=0;x<SIZE;x++){
let col=[];
for(let y=SIZE-1;y>=0;y--){
if(board[y][x]!=null) col.push(board[y][x]);
}
while(col.length<SIZE) col.push(randomType());


for(let y=SIZE-1;y>=0;y--){
  board[y][x]=col[SIZE-1-y];
}


}
}

function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// ===== 計時 =====
function startTimer(){
let timer = setInterval(()=>{
if(gameOver) return;

timeLeft--;
draw();

if(timeLeft<=0){
  gameOver=true;
  clearInterval(timer);
  alert("時間到！分數："+score);
}


},1000);
}

</script>

</body>
</html>
