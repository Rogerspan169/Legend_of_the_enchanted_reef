<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消遊戲</title>
<style>
  body {
    background: #0b2a3c;
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  canvas {
    background: #0e3f5a;
    border: 3px solid white;
  }
</style>
</head>
<body>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 5;
const OFFSET_Y = 100;

// ===== 圖片 =====
const images = [];
const imagePaths = [
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/plastic_bag.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/PET_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/can.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/tire.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/glass_bottle.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Shorty.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Indigo.png",
"https://raw.githubusercontent.com/Rogerspan169/Legend_of_the_enchanted_reef/main/images/Jake.png"
];

let loaded = 0;
for (let i = 0; i < imagePaths.length; i++) {
  let img = new Image();
  img.src = imagePaths[i];
  img.onload = () => {
    loaded++;
    if (loaded === imagePaths.length) {
      initBoard();
      draw();
      startTimer();
    }
  };
  images.push(img);
}

// ===== 狀態 =====
let board = [];
let selected = null;
let isAnimating = false;

let score = 0;
let combo = 0;
let comboCount = 0;
let timeLeft = 60;
let gameOver = false;

let floatingTexts = [];

//addFloatingText(cx*TILE, cy*TILE + OFFSET_Y, "+" + base);

// ===== 初始化 =====
function initBoard() {
  board = [];
  for (let y = 0; y < SIZE; y++) {
    let row = [];
    for (let x = 0; x < SIZE; x++) {
      row.push(getSafeRandom(x, y, row));
    }
    board.push(row);
  }

  function getSafeRandom(x, y, row) {
    let type;
    do {
      type = Math.floor(Math.random() * TYPES);
    } while (
      (x >= 2 &&
       row[x-1].type === type &&
       row[x-2].type === type) ||
      (y >= 2 &&
       board[y-1][x].type === type &&
       board[y-2][x].type === type)
    );

    return { type: type, special: null };
  }
}

function randomTile() {
  return {
    type: Math.floor(Math.random() * TYPES),
    special: null
  };
}

// ===== 畫面 =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      drawTile(board[y][x], x, y);
    }
  }

  if (selected) {
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 5;
    ctx.strokeRect(selected.x*TILE, selected.y*TILE + OFFSET_Y, TILE, TILE);
  }

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("分數: " + score, 100, 50);
  ctx.fillText("時間: " + timeLeft, 250, 50);
  ctx.fillText("Combo: " + combo, 400, 50);

  floatingTexts.forEach(ft => {
    ctx.fillStyle = "yellow";
    ctx.fillText(ft.text, ft.x, ft.y);
    ft.y -= 1;
    ft.life--;
  });

  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function drawTile(tile, x, y) {
  if (!tile) return;

  let img;
  if (tile.special === "line4") img = images[5];
  else if (tile.special === "T") img = images[6];
  else if (tile.special === "line5") img = images[7];
  else img = images[tile.type];

  ctx.drawImage(img, x*TILE, y*TILE + OFFSET_Y, TILE, TILE);
}

// ===== 點擊 =====
canvas.addEventListener("click", (e) => {
  if (isAnimating || gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / TILE);
  const y = Math.floor((e.clientY - rect.top - OFFSET_Y) / TILE);

  if (!selected) {
    selected = {x,y};
  } else {
    let dx = Math.abs(selected.x - x);
    let dy = Math.abs(selected.y - y);

    if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
      swap(selected, {x,y});
      selected = null;
    } else {
      selected = {x,y};
    }
  }
  draw();
});

// ===== 交換 =====
function swap(a,b) {
  isAnimating = true;
  combo = 0;
  comboCount = 0;

  [board[a.y][a.x], board[b.y][b.x]] =
  [board[b.y][b.x], board[a.y][a.x]];

  setTimeout(()=>{
    let matches = findMatchGroups();

    if (matches.length === 0) {
      [board[a.y][a.x], board[b.y][b.x]] =
      [board[b.y][b.x], board[a.y][a.x]];
      isAnimating = false;
      draw();
    } else {
      resolveMatches();
    }
  },200);
}

// ===== 找三消 =====
function findMatchGroups() {
  let groups = [];

  for (let y = 0; y < SIZE; y++) {
    let count = 1;
    for (let x = 1; x < SIZE; x++) {
      if (board[y][x].type === board[y][x-1].type) count++;
      else {
        if (count >= 3) {
          let g = [];
          for (let k = 0; k < count; k++) g.push([y, x-1-k]);
          groups.push(g);
        }
        count = 1;
      }
    }
    if (count >= 3) {
      let g = [];
      for (let k = 0; k < count; k++) g.push([y, SIZE-1-k]);
      groups.push(g);
    }
  }

  for (let x = 0; x < SIZE; x++) {
    let count = 1;
    for (let y = 1; y < SIZE; y++) {
      if (board[y][x].type === board[y-1][x].type) count++;
      else {
        if (count >= 3) {
          let g = [];
          for (let k = 0; k < count; k++) g.push([y-1-k, x]);
          groups.push(g);
        }
        count = 1;
      }
    }
    if (count >= 3) {
      let g = [];
      for (let k = 0; k < count; k++) g.push([SIZE-1-k, x]);
      groups.push(g);
    }
  }

  return groups;
}

// ===== 消除 =====
function resolveMatches(){
  let groups = mergeGroups(findMatchGroups());

  if(groups.length === 0){
    if(comboCount >= 2){
      score += comboCount * 10;
    }
    isAnimating = false;
    combo = 0;
    comboCount = 0;
    return;
  }

  let group = groups[0];

  combo++;
  comboCount++;

  let ys = group.map(p=>p[0]);
  let xs = group.map(p=>p[1]);

  let uniqueY = new Set(ys).size;
  let uniqueX = new Set(xs).size;

  let base = 0;
  let specialType = null;

  if(group.length >= 4 && uniqueX >= 2 && uniqueY >= 2){
    base = 25; specialType = "T";
  }
  else if(group.length >= 5 && (uniqueX === 1 || uniqueY === 1)){
    base = 35; specialType = "line5";
  }
  else if(group.length === 4 && (uniqueX === 1 || uniqueY === 1)){
  base = 20;
  specialType = "line4";
}
  else if(group.length === 3){
    base = 10;
  }

  score += base;

  let center = group[Math.floor(group.length / 2)];
  let [cy, cx] = center;
  let originalType = board[cy][cx].type;

  // ⭐ 加在這裡
addFloatingText(cx*TILE, cy*TILE + OFFSET_Y, "+" + base);

  group.forEach(([y,x])=>{
    if (y === cy && x === cx) return;
    board[y][x] = null;
  });

  if (specialType){
    board[cy][cx] = { type: originalType, special: specialType };
  } else {
    board[cy][cx] = null;
  }

  setTimeout(()=>{
  dropTiles();
  draw();

  setTimeout(()=>{
    requestAnimationFrame(resolveMatches); // ⭐讓出主執行緒
  },200);

},200);
}

function mergeGroups(groups) {
  let merged = [];

  groups.forEach(group => {
    let added = false;

    for (let m of merged) {
      if (group.some(([y,x]) =>
          m.some(([y2,x2]) => y===y2 && x===x2)
      )) {
        m.push(...group);
        added = true;
        break;
      }
    }

    if (!added) merged.push([...group]);
  });

  return merged.map(group => {
    let set = new Set(group.map(([y,x])=>y+"_"+x));
    return Array.from(set).map(s=>{
      let [y,x]=s.split("_").map(Number);
      return [y,x];
    });
  });
}

// ===== 掉落 =====
function dropTiles(){
  for(let x=0;x<SIZE;x++){
    let col=[];
    for(let y=SIZE-1;y>=0;y--){
      if(board[y][x]!=null) col.push(board[y][x]);
    }
    while(col.length<SIZE) col.push(randomTile());

    for(let y=SIZE-1;y>=0;y--){
      board[y][x]=col[SIZE-1-y];
    }
  }
}

// ===== Loop =====
function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// ===== 計時 =====
function startTimer(){
  let timer = setInterval(()=>{
    if(gameOver) return;
    timeLeft--;

    if(timeLeft<=0){
      gameOver=true;
      clearInterval(timer);
      alert("時間到！分數："+score);
    }
  },1000);
}
</script>
</body>
</html>
