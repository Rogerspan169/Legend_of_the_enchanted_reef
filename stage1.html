<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消遊戲</title>
<style>
body {
  background: #0b2a3c;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: white;
  font-family: sans-serif;
}

#ui {
margin: 10px;
font-size: 20px;
}

canvas {
background: #0e3f5a;
border: 3px solid white;
cursor: pointer;
} </style>

</head>
<body>

<div id="ui">
  分數：<span id="score">0</span>　
  Combo：<span id="combo">0</span>　
  時間：<span id="time">60</span>
</div>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 4;

const img = new Image();
img.src = "sprite_sheet.png";

let board = [];
let selected = null;
let isAnimating = false;

let score = 0;
let combo = 0;
let timeLeft = 60;
let gameOver = false;

// 淡出效果
let fading = [];

// 初始化
function initBoard() {
  board = [];
  for (let y = 0; y < SIZE; y++) {
    let row = [];
    for (let x = 0; x < SIZE; x++) {
      row.push(randomType());
    }
    board.push(row);
  }
}

function randomType() {
  return Math.floor(Math.random() * TYPES);
}

// 畫面
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      let type = board[y][x];
      if (type != null) drawTile(type, x, y);
    }
  }

  // 畫淡出
  fading.forEach(f => {
    ctx.globalAlpha = f.alpha;
    drawTile(f.type, f.x, f.y);
    ctx.globalAlpha = 1;
  });

  // 選取框（粗）
  if (selected) {
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 6;
    ctx.strokeRect(
      selected.x * TILE,
      selected.y * TILE,
      TILE,
      TILE
    );
  }
}

// 畫單格
function drawTile(type, x, y) {
  const sx = (type % 2) * 256;
  const sy = Math.floor(type / 2) * 256;

  ctx.drawImage(
    img,
    sx, sy, 256, 256,
    x * TILE, y * TILE,
    TILE, TILE
  );
}

// 點擊
canvas.addEventListener("click", (e) => {
  if (isAnimating || gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / TILE);
  const y = Math.floor((e.clientY - rect.top) / TILE);

  if (!selected) {
    selected = {x, y};
  } else {
    const dx = Math.abs(selected.x - x);
    const dy = Math.abs(selected.y - y);

    if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
      swap(selected, {x, y});
      selected = null;
    } else {
      selected = {x, y};
    }
  }

  draw();
});

// 交換
function swap(a, b) {
  isAnimating = true;
  combo = 0;

  let temp = board[a.y][a.x];
  board[a.y][a.x] = board[b.y][b.x];
  board[b.y][b.x] = temp;

  setTimeout(() => {
    let matches = findMatches();

    if (matches.length === 0) {
      // 換回來
      let temp = board[a.y][a.x];
      board[a.y][a.x] = board[b.y][b.x];
      board[b.y][b.x] = temp;
      isAnimating = false;
      draw();
    } else {
      resolveMatches(true);
    }
  }, 200);
}

// 找消除
function findMatches() {
  let matches = [];

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE - 2; x++) {
      let t = board[y][x];
      if (t !== null &&
          t === board[y][x+1] &&
          t === board[y][x+2]) {
        matches.push([y,x],[y,x+1],[y,x+2]);
      }
    }
  }

  for (let x = 0; x < SIZE; x++) {
    for (let y = 0; y < SIZE - 2; y++) {
      let t = board[y][x];
      if (t !== null &&
          t === board[y+1][x] &&
          t === board[y+2][x]) {
        matches.push([y,x],[y+1,x],[y+2,x]);
      }
    }
  }

  return matches;
}

// 消除流程
function resolveMatches(isPlayer) {
  let matches = findMatches();
  if (matches.length === 0) {
    score += combo * 10;
    updateUI();
    isAnimating = false;
    return;
  }

  combo++;

  let unique = {};
  matches.forEach(([y,x]) => unique[y+"_"+x] = true);

  let tiles = Object.keys(unique).map(k=>{
    let [y,x]=k.split("_").map(Number);
    return {y,x,type:board[y][x]};
  });

  // 加分
  tiles.forEach(()=>{
    score += isPlayer ? 10 : 5;
  });

  updateUI();

  // 加入淡出
  tiles.forEach(t=>{
    fading.push({x:t.x,y:t.y,type:t.type,alpha:1});
    board[t.y][t.x] = null;
  });

  animateFade(()=>{
    dropTiles();
    resolveMatches(false);
  });
}

// 淡出動畫
function animateFade(callback) {
  let duration = 300;
  let start = performance.now();

  function frame(now) {
    let p = (now - start) / duration;

    fading.forEach(f=>{
      f.alpha = 1 - p;
    });

    draw();

    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      fading = [];
      callback();
    }
  }

  requestAnimationFrame(frame);
}

// 掉落
function dropTiles() {
  for (let x = 0; x < SIZE; x++) {
    let col = [];

    for (let y = SIZE - 1; y >= 0; y--) {
      if (board[y][x] != null) col.push(board[y][x]);
    }

    while (col.length < SIZE) col.push(randomType());

    for (let y = SIZE - 1; y >= 0; y--) {
      board[y][x] = col[SIZE - 1 - y];
    }
  }
}

// UI
function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
}

// 倒數
setInterval(()=>{
  if (gameOver) return;

  timeLeft--;
  document.getElementById("time").innerText = timeLeft;

  if (timeLeft <= 0) {
    gameOver = true;
    alert("時間到！分數：" + score);
  }
},1000);

// 啟動
img.onload = () => {
  initBoard();
  draw();
};
</script>

</body>
</html>
