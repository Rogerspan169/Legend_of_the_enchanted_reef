<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海洋三消遊戲</title>
<style>
  body {
    background: #0b2a3c;
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  canvas {
    background: #0e3f5a;
    border: 3px solid white;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 10;
const TILE = 50;
const TYPES = 4;

const img = new Image();
img.src = "sprite_sheet.png";

let board = [];
let selected = null;
let isAnimating = false;

// 初始化
function initBoard() {
  board = [];
  for (let y = 0; y < SIZE; y++) {
    let row = [];
    for (let x = 0; x < SIZE; x++) {
      row.push(randomType());
    }
    board.push(row);
  }
}

// 隨機
function randomType() {
  return Math.floor(Math.random() * TYPES);
}

// 畫面
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      drawTile(board[y][x], x, y);
    }
  }

  // 畫選取框
  if (selected) {
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 3;
    ctx.strokeRect(
      selected.x * TILE,
      selected.y * TILE,
      TILE,
      TILE
    );
  }
}

// 畫圖
function drawTile(type, x, y) {
  const sx = (type % 2) * 256;
  const sy = Math.floor(type / 2) * 256;

  ctx.drawImage(
    img,
    sx, sy, 256, 256,
    x * TILE, y * TILE,
    TILE, TILE
  );
}

// 點擊
canvas.addEventListener("click", (e) => {
  if (isAnimating) return;

  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / TILE);
  const y = Math.floor((e.clientY - rect.top) / TILE);

  if (!selected) {
    selected = {x, y};
  } else {
    const dx = Math.abs(selected.x - x);
    const dy = Math.abs(selected.y - y);

    // 相鄰才交換
    if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
      swap(selected, {x, y});
      selected = null;
    } else {
      selected = {x, y};
    }
  }

  draw();
});

// 交換
function swap(a, b) {
  isAnimating = true;

  let temp = board[a.y][a.x];
  board[a.y][a.x] = board[b.y][b.x];
  board[b.y][b.x] = temp;

  setTimeout(() => {
    let matches = findMatches();

    if (matches.length === 0) {
      // 換回來
      let temp = board[a.y][a.x];
      board[a.y][a.x] = board[b.y][b.x];
      board[b.y][b.x] = temp;
      isAnimating = false;
      draw();
    } else {
      resolveMatches();
    }
  }, 200);
}

// 找三消
function findMatches() {
  let matches = [];

  // 橫
  for (let y = 0; y < SIZE; y++) {
    let count = 1;
    for (let x = 1; x < SIZE; x++) {
      if (board[y][x] === board[y][x - 1]) {
        count++;
      } else {
        if (count >= 3) {
          for (let k = 0; k < count; k++) {
            matches.push([y, x - 1 - k]);
          }
        }
        count = 1;
      }
    }
    if (count >= 3) {
      for (let k = 0; k < count; k++) {
        matches.push([y, SIZE - 1 - k]);
      }
    }
  }

  // 直
  for (let x = 0; x < SIZE; x++) {
    let count = 1;
    for (let y = 1; y < SIZE; y++) {
      if (board[y][x] === board[y - 1][x]) {
        count++;
      } else {
        if (count >= 3) {
          for (let k = 0; k < count; k++) {
            matches.push([y - 1 - k, x]);
          }
        }
        count = 1;
      }
    }
    if (count >= 3) {
      for (let k = 0; k < count; k++) {
        matches.push([SIZE - 1 - k, x]);
      }
    }
  }

  return matches;
}

// 消除流程
function resolveMatches() {
  let matches = findMatches();

  if (matches.length === 0) {
    isAnimating = false;
    return;
  }

  // 消除
  for (let [y, x] of matches) {
    board[y][x] = null;
  }

  draw();

  setTimeout(() => {
    dropTiles();
    draw();

    setTimeout(resolveMatches, 200);
  }, 200);
}

// 掉落
function dropTiles() {
  for (let x = 0; x < SIZE; x++) {
    let col = [];

    for (let y = SIZE - 1; y >= 0; y--) {
      if (board[y][x] != null) {
        col.push(board[y][x]);
      }
    }

    while (col.length < SIZE) {
      col.push(randomType());
    }

    for (let y = SIZE - 1; y >= 0; y--) {
      board[y][x] = col[SIZE - 1 - y];
    }
  }
}

// 啟動
img.onload = () => {
  initBoard();
  draw();
};
</script>

</body>
</html>
